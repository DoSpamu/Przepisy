/* ─── Fetch functions ─────────────────── */
async function fetchWikimedia(query, wikiTitle) {
  const results = [];
  // pl.Wikipedia page image
  if (wikiTitle) {
    try {
      const r = await fetch(`https://pl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=600&pilimit=1&origin=*`);
      const d = await r.json();
      const pg = Object.values(d?.query?.pages||{})[0];
      if (pg?.thumbnail?.source) results.push({thumb:pg.thumbnail.source, full:pg.thumbnail.source, title:"Wikipedia: "+wikiTitle});
    } catch{}
  }
  // Wikimedia Commons search
  try {
    const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=18&format=json&origin=*`);
    const d = await r.json();
    const titles = (d?.query?.search||[]).map(s=>s.title);
    if (titles.length) {
      const r2 = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join("|"))}&prop=imageinfo&iiprop=url|thumburl|mime&iiurlwidth=400&format=json&origin=*`);
      const d2 = await r2.json();
      Object.values(d2?.query?.pages||{}).forEach(p=>{
        const mime=p.imageinfo?.[0]?.mime||"";
        if(mime.startsWith("image/")&&!mime.includes("svg")){
          const thumb=p.imageinfo?.[0]?.thumburl||p.imageinfo?.[0]?.url;
          const full=p.imageinfo?.[0]?.url;
          if(thumb) results.push({thumb,full,title:p.title?.replace("File:","")});
        }
      });
    }
  } catch{}
  return results;
}

async function fetchUnsplash(query, key) {
  if (!key) throw new Error("Brak klucza Unsplash API");
  const r = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape&client_id=${key}`);
  if (!r.ok) throw new Error("Błąd Unsplash API ("+r.status+")");
  const d = await r.json();
  return (d.results||[]).map(p=>({thumb:p.urls.small, full:p.urls.regular, title:p.description||p.alt_description||""}));
}

async function fetchPexels(query, key) {
  if (!key) throw new Error("Brak klucza Pexels API");
  const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape`,{headers:{Authorization:key}});
  if (!r.ok) throw new Error("Błąd Pexels API ("+r.status+")");
  const d = await r.json();
  return (d.photos||[]).map(p=>({thumb:p.src.medium, full:p.src.large, title:p.alt||""}));
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800}}>🔑 Klucze API</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {/* Wikimedia */}
        <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,color:"#0369a1",marginBottom:4}}>🌐 Wikimedia Commons — <span style={{color:"#16a34a"}}>DARMOWE, bez klucza</span></div>
          <div style={{fontSize:12,color:"#0369a1"}}>Działa od razu. Najlepsze dla polskich dań (Gołąbki, Zrazy, Kartoflanka itd.)</div>
        </div>

        {/* Unsplash */}
        <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:10,padding:12,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,color:"#6d28d9",marginBottom:6}}>📷 Unsplash API</div>
          <div style={{fontSize:12,color:"#7c3aed",marginBottom:8}}>
            Darmowe • <a href="https://unsplash.com/developers" target="_blank" style={{color:"#6d28d9"}}>unsplash.com/developers</a> → Register → New Application → skopiuj Access Key
          </div>
          <input value={u} onChange={e=>setU(e.target.value)} placeholder="Wklej Unsplash Access Key..."/>
        </div>

        {/* Pexels */}
        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:12,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:"#166534",marginBottom:6}}>🖼️ Pexels API</div>
          <div style={{fontSize:12,color:"#15803d",marginBottom:8}}>
            Darmowe • <a href="https://www.pexels.com/api/" target="_blank" style={{color:"#166534"}}>pexels.com/api</a> → Get Started → skopiuj API Key
          </div>
          <input value={p} onChange={e=>setP(e.target.value)} placeholder="Wklej Pexels API Key..."/>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-primary" style={{flex:1}}
            onClick={()=>{onSave({unsplash:u.trim(),pexels:p.trim()});onClose();}}>
            💾 Zapisz klucze
          </button>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Image Picker ────────────────────── */
function ImagePicker({recipe, keys, onPick, onClose}) {
  const [source,   setSource]   = useState("wikimedia");
  const [query,    setQuery]    = useState(recipe.q);
  const [results,  setResults]  = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState("");
  const [selected, setSelected] = useState(null);
  const [manualUrl,setManual]   = useState("");

  const search = async (src, q) => {
    if (src==="manual") return;
    setLoading(true); setError(""); setResults([]); setSelected(null);
    try {
      let imgs = [];
      if (src==="wikimedia") imgs = await fetchWikimedia(q, recipe.wiki);
      else if (src==="unsplash") imgs = await fetchUnsplash(q, keys.unsplash);
      else if (src==="pexels")   imgs = await fetchPexels(q, keys.pexels);
      setResults(imgs);
      if (!imgs.length) setError("Brak wyników — spróbuj innych słów kluczowych.");
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ search(source, query); },[source]);

  const srcInfo = SOURCES.find(s=>s.id===source);
  const needsKey = !srcInfo.free;
  const hasKey = source==="unsplash" ? !!keys.unsplash : source==="pexels" ? !!keys.pexels : true;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="picker-modal" onClick={e=>e.stopPropagation()}>
        {/* header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:17,fontWeight:800,color:"#1e293b"}}>📷 Wybierz zdjęcie</h2>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{recipe.name}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {/* source selector */}
        <div style={{display:"flex",gap:4,marginBottom:14,background:"#f1f5f9",borderRadius:12,padding:4}}>
          {SOURCES.map(s=>(
            <button key={s.id} className="tab-btn"
              onClick={()=>setSource(s.id)}
              style={{background:source===s.id?"#fff":"transparent",
                color:source===s.id?s.color:"#64748b",
                boxShadow:source===s.id?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {s.emoji} {s.label}
              {s.free&&<span style={{fontSize:9,marginLeft:3,color:"#16a34a",fontWeight:900}}>FREE</span>}
            </button>
          ))}
        </div>

        {/* source description */}
        <div style={{fontSize:12,color:"#64748b",marginBottom:12,padding:"8px 10px",
          background:"#f8fafc",borderRadius:8,borderLeft:`3px solid ${srcInfo.color}`}}>
          {srcInfo.desc}
        </div>

        {/* no key warning */}
        {needsKey && !hasKey && (
          <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"10px 12px",
            fontSize:12,color:"#9a3412",marginBottom:12}}>
            ⚠️ Brak klucza API dla {srcInfo.label}. Zamknij, wejdź w ⚙️ → 🔑 Klucze API i dodaj klucz.
          </div>
        )}

        {/* search row */}
        {source!=="manual" && (
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&search(source,query)}
              placeholder="Szukaj po polsku lub angielsku..."
              disabled={needsKey&&!hasKey}/>
            <button onClick={()=>search(source,query)} className="btn btn-primary"
              style={{whiteSpace:"nowrap",opacity:needsKey&&!hasKey?.4:1}}
              disabled={needsKey&&!hasKey}>
              🔍 Szukaj
            </button>
          </div>
        )}

        {/* results grid */}
        {loading && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {Array(9).fill(0).map((_,i)=>(
              <div key={i} className="skeleton" style={{aspectRatio:"4/3",borderRadius:8}}/>
            ))}
          </div>
        )}
        {error && (
          <div style={{color:"#f59e0b",fontSize:13,padding:"10px 12px",background:"#fffbeb",
            borderRadius:8,border:"1px solid #fde68a",marginBottom:8}}>{error}</div>
        )}
        {!loading && source!=="manual" && results.length>0 && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
            {results.map((img,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={img.thumb} alt="" className={"thumb"+(selected===i?" sel":"")}
                  onClick={()=>setSelected(i)}
                  onError={e=>e.target.closest("div").style.display="none"}/>
                {selected===i&&(
                  <div style={{position:"absolute",top:6,left:6,background:"#22c55e",borderRadius:"50%",
                    width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:14,color:"#fff",fontWeight:800,pointerEvents:"none"}}>✓</div>
                )}
                {img.title&&<div style={{fontSize:9,color:"#94a3b8",marginTop:2,overflow:"hidden",
                  whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{img.title}</div>}
              </div>
            ))}
          </div>
        )}

        {/* manual URL tab */}
        {source==="manual" && (
          <div>
            <p style={{fontSize:13,color:"#475569",marginBottom:10,lineHeight:1.6}}>
              Znajdź zdjęcie na <b>kwestiasmaku.com</b>, Google Images lub gdziekolwiek.<br/>
              <b>Prawy klik na zdjęcie → "Kopiuj adres obrazu"</b> → wklej poniżej.
            </p>
            <input value={manualUrl} onChange={e=>setManual(e.target.value)}
              placeholder="https://..."/>
            {manualUrl&&(
              <div style={{marginTop:10,borderRadius:10,overflow:"hidden",border:"2px solid #e2e8f0"}}>
                <img src={manualUrl} alt="podgląd"
                  style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}
                  onError={e=>e.target.style.display="none"}/>
              </div>
            )}
          </div>
        )}

        {/* footer */}
        <div style={{display:"flex",gap:8,marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:14}}>
          {source==="manual"
            ? <button className="btn btn-primary" style={{flex:1,opacity:!manualUrl?.4:1}}
                disabled={!manualUrl.trim()}
                onClick={()=>manualUrl.trim()&&onPick(manualUrl.trim())}>
                ✅ Ustaw ten URL
              </button>
            : <button className="btn btn-primary" style={{flex:1,opacity:selected===null?.4:1}}
                disabled={selected===null}
                onClick={()=>selected!==null&&onPick(results[selected].full)}>
                ✅ Ustaw to zdjęcie
              </button>
          }
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Card Image ──────────────────────── */
function CardImg({r, url, adminMode, onPickRequest}) {
  const [err,setErr]=useState(false);
  useEffect(()=>setErr(false),[url]);
  return (
    <div style={{position:"relative",height:160,background:"#e2e8f0",overflow:"hidden",flexShrink:0}}>
      {url&&!err
        ? <img src={url} alt={r.name} onError={()=>setErr(true)}
            style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>
        : <div style={{height:160,display:"flex",flexDirection:"column",alignItems:"center",
            justifyContent:"center",gap:6,background:"#f1f5f9"}}>
            <span style={{fontSize:44}}>{catEmoji[r.cat]||"🍽️"}</span>
            {adminMode&&<span style={{fontSize:10,color:"#94a3b8"}}>kliknij 📷 aby dodać</span>}
          </div>
      }
      <a href={r.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.65)",color:"#fff",
          borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,textDecoration:"none",
          backdropFilter:"blur(4px)"}}>▶ Film</a>
      {adminMode&&(
        <button onClick={e=>{e.stopPropagation();onPickRequest();}}
          style={{position:"absolute",bottom:8,left:8,background:"rgba(99,102,241,0.88)",
            color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,
            fontWeight:700,cursor:"pointer",backdropFilter:"blur(4px)"}}>
          📷 {url&&!err?"Zmień":"Dodaj"}
        </button>
      )}
    </div>
  );
}

/* ─── Recipe Modal ────────────────────── */
function RecipeModal({recipe, onSave, onClose}) {
  const empty={name:"",cat:"🐔 Kurczak",link:"",note:"",wiki:"",q:"",skladniki:[""]};
  const [f,setF]=useState(recipe?{...recipe,skladniki:[...recipe.skladniki]}:empty);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setSk=(i,v)=>setF(p=>{const s=[...p.skladniki];s[i]=v;return{...p,skladniki:s}});
  const addSk=()=>setF(p=>({...p,skladniki:[...p.skladniki,""]}));
  const delSk=i=>setF(p=>{const s=p.skladniki.filter((_,j)=>j!==i);return{...p,skladniki:s.length?s:[""]}});
  const submit=()=>{if(!f.name.trim())return alert("Podaj nazwę!");onSave({...f,skladniki:f.skladniki.filter(s=>s.trim())});};
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800}}>{recipe?"✏️ Edytuj":"➕ Nowy przepis"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        <label>Nazwa dania *</label><input value={f.name} onChange={e=>set("name",e.target.value)}/>
        <label>Kategoria</label>
        <select value={f.cat} onChange={e=>set("cat",e.target.value)}>
          {ALL_CATS.map(c=><option key={c}>{c}</option>)}
        </select>
        <label>Link do filmu</label><input value={f.link} onChange={e=>set("link",e.target.value)} placeholder="https://youtube.com/..."/>
        <label>Notatka</label><input value={f.note} onChange={e=>set("note",e.target.value)}/>
        <label>Tytuł artykułu pl.Wikipedia (opcjonalnie)</label>
        <input value={f.wiki||""} onChange={e=>set("wiki",e.target.value)} placeholder="np. Zrazy, Gołąbki, Bigos"/>
        <label>Słowa do szukania zdjęcia</label>
        <input value={f.q} onChange={e=>set("q",e.target.value)} placeholder="np. kurczak sos cebulowy obiad"/>
        <label>Składniki</label>
        {f.skladniki.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input value={s} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>
            <button className="btn btn-danger btn-sm" onClick={()=>delSk(i)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
        <button className="btn btn-sm" onClick={addSk}
          style={{background:"#f1f5f9",color:"#475569",width:"100%",marginTop:4}}>+ Dodaj składnik</button>
        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button className="btn btn-primary" onClick={submit} style={{flex:1}}>{recipe?"💾 Zapisz":"➕ Dodaj"}</button>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Card ────────────────────────────── */
function Card({r, expanded, onToggle, onEdit, onDelete, adminMode, url, onPickRequest}) {
  const b=catBorder[r.cat]||"#6366f1";
  return (
    <div onClick={onToggle}
      style={{background:catColors[r.cat]||"#fff",borderRadius:14,cursor:"pointer",overflow:"hidden",
        display:"flex",flexDirection:"column",
        border:`2px solid ${expanded?b:"transparent"}`,
        boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
      <CardImg r={r} url={url} adminMode={adminMode} onPickRequest={onPickRequest}/>
      <div style={{padding:"12px 14px 10px",flex:1}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",lineHeight:1.4}}>{r.name}</div>
        {r.note&&<span style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.06)",
          padding:"2px 7px",borderRadius:10,display:"inline-block",marginTop:6}}>{r.note}</span>}
        <div style={{marginTop:8,fontSize:12,color:"#64748b"}}>{expanded?"▲ Zwiń":"▼ Składniki"}</div>
      </div>
      {expanded&&(
        <div style={{padding:"0 14px 10px"}}>
          <div style={{background:"rgba(255,255,255,0.7)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,
              textTransform:"uppercase",letterSpacing:".5px"}}>Składniki:</div>
            {r.skladniki.map((s,i)=>(
              <div key={i} style={{fontSize:13,color:"#1e293b",padding:"3px 0",display:"flex",gap:6}}>
                <span style={{color:b,fontWeight:700,flexShrink:0}}>•</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}
      {adminMode&&(
        <div style={{display:"flex",gap:6,padding:"0 14px 12px"}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-sm" onClick={onEdit}
            style={{flex:1,background:"#e0e7ff",color:"#4338ca"}}>✏️ Edytuj</button>
          <button className="btn btn-danger btn-sm"
            onClick={()=>confirm("Usunąć?")&&onDelete()} style={{flex:1}}>🗑️ Usuń</button>
        </div>
      )}
    </div>
  );
}

/* ─── App ─────────────────────────────── */
function App() {
  const [recipes,   setRecipes]   = useState(()=>gs(KR)||DR);
  const [chosen,    setChosen]    = useState(()=>gs(KI)||{});
  const [keys,      setKeys]      = useState(()=>gs(KK)||{unsplash:"",pexels:""});
  const [activeCat, setActiveCat] = useState("Wszystkie");
  const [expanded,  setExpanded]  = useState(null);
  const [search,    setSearch]    = useState("");
  const [adminMode, setAdminMode] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [picker,    setPicker]    = useState(null);
  const [keysModal, setKeysModal] = useState(false);

  useEffect(()=>ss(KR,recipes),[recipes]);
  useEffect(()=>ss(KI,chosen),[chosen]);
  useEffect(()=>ss(KK,keys),[keys]);

  const handlePick=(id,url)=>{setChosen(c=>({...c,[id]:url}));setPicker(null);};
  const addOrUpdate=form=>{
    if(editModal==="new") setRecipes(rs=>[...rs,{...form,id:Math.max(0,...rs.map(r=>r.id))+1}]);
    else setRecipes(rs=>rs.map(r=>r.id===editModal.id?{...form,id:r.id}:r));
    setEditModal(null);
  };

  const cats=["Wszystkie",...Array.from(new Set(recipes.map(r=>r.cat)))];
  const filtered=recipes.filter(r=>{
    const mc=activeCat==="Wszystkie"||r.cat===activeCat;
    const ms=r.name.toLowerCase().includes(search.toLowerCase())||
      r.skladniki.some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const keyCount = [keys.unsplash,keys.pexels].filter(Boolean).length;

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"4px 0 0",opacity:.7,fontSize:13}}>{recipes.length} przepisów</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {adminMode&&<>
                <button className="btn" onClick={()=>setEditModal("new")} style={{background:"#22c55e",color:"#fff"}}>➕ Nowy</button>
                <button className="btn btn-sm" onClick={()=>setKeysModal(true)}
                  style={{background:"rgba(255,255,255,0.12)",color:"#fff"}}>
                  🔑 Klucze API {keyCount>0&&<span style={{background:"#22c55e",borderRadius:"50%",width:16,height:16,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,marginLeft:4}}>{keyCount}</span>}
                </button>
              </>}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Edycja ON":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          {adminMode&&(
            <div style={{marginTop:10,padding:"9px 12px",background:"rgba(99,102,241,0.2)",
              borderRadius:8,border:"1px solid rgba(99,102,241,0.35)",fontSize:12,color:"#c7d2fe"}}>
              💡 Kliknij <b>📷 Dodaj/Zmień</b> na karcie → wybierz źródło (Wikimedia FREE / Unsplash / Pexels / własny URL)
            </div>
          )}
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>

      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0&&
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>Brak wyników 😶</p>}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <Card key={r.id} r={r}
                  url={chosen[r.id]||""}
                  onPickRequest={()=>setPicker(r)}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setEditModal(r)}
                  onDelete={()=>setRecipes(rs=>rs.filter(x=>x.id!==r.id))}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>
        Źródła zdjęć: 🌐 Wikimedia · 📷 Unsplash · 🖼️ Pexels · 🔗 własny URL · dane w localStorage
      </p>

      {picker&&<ImagePicker recipe={picker} keys={keys}
        onPick={url=>handlePick(picker.id,url)} onClose={()=>setPicker(null)}/>}
      {editModal&&<RecipeModal recipe={editModal==="new"?null:editModal}
        onSave={addOrUpdate} onClose={()=>setEditModal(null)}/>}
      {keysModal&&<KeysModal keys={keys}
        onSave={k=>{setKeys(k);ss(KK,k);}} onClose={()=>setKeysModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
