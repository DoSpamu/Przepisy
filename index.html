async function sheetsLoad() {
  try {
    const {data,error} = await sb.from("recipes").select("*").order("added_at",{ascending:true});
    if(error||!data) return [];
    return data.map(r=>({
      id:r.id, cat:r.cat||"", name:r.name||"",
      link:r.link||"", note:r.note||"", wiki:r.wiki||"",
      q:r.q||"", skladniki:r.skladniki||[], addedAt:r.added_at,
    }));
  } catch { return []; }
}

async function sheetsSave(recipe) {
  try {
    await sb.from("recipes").insert({
      id:recipe.id, cat:recipe.cat||"", name:recipe.name||"",
      link:recipe.link||"", note:recipe.note||"community 🤝",
      wiki:recipe.wiki||"", q:recipe.q||"",
      skladniki:recipe.skladniki||[], added_at:new Date().toISOString(),

  } catch(e) { console.warn("Supabase insert error:",e); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ANALIZA PRZEPISU (lokalna, 100% niezawodna)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function getYTTitle(url) {
  try {
    const r = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if(r.ok){ const d=await r.json(); return d.title||""; }
  } catch {}
  return "";
}

function analyzeTitle(title, url) {
  const t = (title||url||"").toLowerCase();

  const CATS = [
    {cat:"🐔 Kurczak",  k:["kurczak","chicken","drób","skrzydełka","udka kurczak"],
     sk:["filet z kurczaka","cebula","czosnek","masło","sół, pieprz"]},
    {cat:"🥩 Schab",    k:["schab","kotlet schabowy","pork loin","pork chop"],
     sk:["schab wieprzowy","cebula","masło","mąka","sół, pieprz"]},
    {cat:"🥩 Karkówka", k:["karkówka","kark","neck"],
     sk:["karkówka wieprzowa","cebula","czosnek","olej","sół, pieprz"]},
    {cat:"🐄 Wołowina", k:["wołowin","beef","steak","zrazy","żeberka wołow","rostbef"],
     sk:["wołowina","cebula","czosnek","bulion","sół, pieprz"]},
    {cat:"🌭 Kiełbasa",  k:["kiełbas","chorizo","sausage","parówk","kabanos"],
     sk:["kiełbasa","cebula","czosnek","olej"]},
    {cat:"🐟 Ryba",      k:["ryb","łosoś","dorsz","tuńczyk","fish","salmon","śledź","pstrąg"],
     sk:["filet rybny","masło","cytryna","sół, pieprz"]},
    {cat:"🥗 Sałatki",   k:["sałatk","surówk","salad","coleslaw","buraczk","mizeria"],
     sk:["warzywa","oliwa","sół","pieprz"]},
    {cat:"🥖 Pieczywo",  k:["chleb","bułk","bread","pizza","lawasz","tortilla","focaccia","naan"],
     sk:["mąka pszenna","drożdże","woda","sół"]},
    {cat:"🥘 Wariacje",  k:["makaron","pasta","ryż","rice","noodle","zupa","soup","risotto"],
     sk:["składniki wg przepisu"]},
  ];

  const EXTRAS = {
    "cebulowy":["cebula (dużo)","masło","tymianek"],
    "pomidorow":["koncentrat pomidorowy","passata","oregano"],
    "śmietanow":["śmietanka kremówka","masło"],
    "serowy":["ser żółty","śmietanka kremówka"],
    "miodow":["miód","czosnek","sos sojowy"],
    "czosnkow":["czosnek","masło","natka pietruszki"],
    "teriyaki":["sos sojowy","miód","imbir","olej sezamowy","sezam"],
    "azjatyck":["sos sojowy","imbir","czosnek","olej sezamowy"],
    "ryż":["ryż"], "makaron":["makaron"],
    "ziemniak":["ziemniaki"], "kapust":["kapusta"],
    "pieczark":["pieczarki"], "papryk":["papryka czerwona"],
  };

  const rule = CATS.find(r=>r.k.some(k=>t.includes(k))) || CATS[CATS.length-1];
  const sk = [...rule.sk];
  for(const[kw,ex] of Object.entries(EXTRAS))
    if(t.includes(kw)) ex.forEach(e=>!sk.includes(e)&&sk.push(e));

  const name = (title||"Przepis kulinarny")
    .replace(/\s*[\|–—]\s*.{0,40}$/, "")
    .replace(/\s*-\s*[A-ZĄĆĘŁŃÓŚŹŻ][a-ząćęłńóśźż]{2,}\s*$/, "")
    .trim();

  const catEn={
    "🐔 Kurczak":"chicken","🥩 Schab":"pork loin","🥩 Karkówka":"pork neck",
    "🐄 Wołowina":"beef dish","🌭 Kiełbasa":"sausage","🐟 Ryba":"fish dish",
    "🥗 Sałatki":"salad","🥖 Pieczywo":"bread","🥘 Wariacje":"food dish"
  };
  const q = (catEn[rule.cat]||"food")+" "+name.split(" ").slice(0,2).join(" ").toLowerCase();

  return {name:name||"Przepis kulinarny", cat:rule.cat, skladniki:sk.slice(0,8), q};
}

async function analyzeLink(url) {
  const title = await getYTTitle(url);
  return analyzeTitle(title, url);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   YOUTUBE HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function ytId(url) {
  if(!url) return null;
  let m;
  m=url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  return null;
}
const ytThumb = (id,q) => `https://img.youtube.com/vi/${id}/${q}.jpg`;
function ytFrames(id){ return [
  {h:ytThumb(id,"hqdefault"), f:ytThumb(id,"mqdefault"), lbl:"okładka"},
  {h:ytThumb(id,"hq1"),       f:ytThumb(id,"1"),         lbl:"~25% 🎬"},
  {h:ytThumb(id,"hq2"),       f:ytThumb(id,"2"),         lbl:"~50% 🎬"},
  {h:ytThumb(id,"hq3"),       f:ytThumb(id,"3"),         lbl:"~75% 🎬"},
];}

async function ytResolveHandle(handle) {
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${CFG.ytKey}`);
    if(!r.ok) return null;
    const d=await r.json(); return d.items?.[0]?.id||null;
  }catch{return null;}
}
async function ytSearchCh(q,cid){
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&channelId=${cid}&type=video&maxResults=3&key=${CFG.ytKey}`);
    if(!r.ok) return [];
    const d=await r.json();
    return (d.items||[]).map(v=>({
      id:v.id.videoId, title:v.snippet.title,
      thumb:v.snippet.thumbnails?.medium?.url||"",
      url:`https://www.youtube.com/watch?v=${v.id.videoId}`,
    }));
  }catch{return [];}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   IMAGE SEARCH APIs
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function imgWikimedia(q, wiki) {
  const out=[];
  if(wiki){try{
    const r=await fetch(`https://pl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wiki)}&prop=pageimages&format=json&pithumbsize=600&pilimit=1&origin=*`);
    const d=await r.json();
    const pg=Object.values(d?.query?.pages||{})[0];
    if(pg?.thumbnail?.source) out.push({thumb:pg.thumbnail.source,full:pg.thumbnail.source,title:"Wikipedia"});
  }catch{}}
  try{
    const r=await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srnamespace=6&srlimit=15&format=json&origin=*`);
    const d=await r.json();
    const titles=(d?.query?.search||[]).map(s=>s.title);
    if(titles.length){
      const r2=await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join("|"))}&prop=imageinfo&iiprop=url|thumburl|mime&iiurlwidth=400&format=json&origin=*`);
      const d2=await r2.json();
      Object.values(d2?.query?.pages||{}).forEach(p=>{
        const mime=p.imageinfo?.[0]?.mime||"";
        if(mime.startsWith("image/")&&!mime.includes("svg")){
          const thumb=p.imageinfo?.[0]?.thumburl||p.imageinfo?.[0]?.url;
          const full=p.imageinfo?.[0]?.url;
          if(thumb) out.push({thumb,full,title:p.title?.replace("File:","")});
        }
      });
    }
  }catch{}
  return out;
}
async function imgUnsplash(q){
  const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&per_page=12&orientation=landscape&client_id=${CFG.unsplash}`);
  if(!r.ok) throw new Error("Unsplash "+r.status);
  const d=await r.json();
  return (d.results||[]).map(p=>({thumb:p.urls.small,full:p.urls.regular,title:p.alt_description||""}));
}
async function imgPexels(q){
  const r=await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=12&orientation=landscape`,{headers:{Authorization:CFG.pexels}});
  if(!r.ok) throw new Error("Pexels "+r.status);
  const d=await r.json();
  return (d.photos||[]).map(p=>({thumb:p.src.medium,full:p.src.large,title:p.alt||""}));
}

const CATS=["🐔 Kurczak","🥩 Schab","🥩 Karkówka","🐄 Wołowina","🌭 Kiełbasa","🐟 Ryba","🥘 Wariacje","🥗 Sałatki","🥖 Pieczywo"];

const CB={"🐔 Kurczak":"#f59e0b","🥩 Schab":"#ec4899","🥩 Karkówka":"#f43f5e","🐄 Wołowina":"#ef4444","🌭 Kiełbasa":"#eab308","🐟 Ryba":"#3b82f6","🥘 Wariacje":"#10b981","🥗 Sałatki":"#059669","🥖 Pieczywo":"#d97706"};
const CE={"🐔 Kurczak":"🐔","🥩 Schab":"🥩","🥩 Karkówka":"🥩","🐄 Wołowina":"🐄","🌭 Kiełbasa":"🌭","🐟 Ryba":"🐟","🥘 Wariacje":"🥘","🥗 Sałatki":"🥗","🥖 Pieczywo":"🥖"};

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARD IMAGE (YT slideshow)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function FrameImg({f, active, setYtErr}) {
  const [src, setSrc] = useState(f.h);
  useEffect(()=>{ setSrc(f.h); }, [f.h]);
  return (
    <img src={src} alt=""
      onError={()=>setSrc(s=>{ if(s===f.h) return f.f; setYtErr(true); return f.f; })}
      style={{position:"absolute",top:0,left:0,width:"100%",height:160,
        objectFit:"cover",display:"block",opacity:active?1:0,transition:"opacity .25s"}}/>
  );
}

function CardImg({r, custom, admin, onPick}) {
  const vid    = ytId(r.link);
  const frames = vid ? ytFrames(vid) : [];
  const N      = frames.length;
  const [idx,  setIdx]  = useState(0);
  const [on,   setOn]   = useState(false);
  const [ytErr,setYtErr]= useState(false);
  const [cErr, setCErr] = useState(false);
  const intRef = useRef(null);
  const barRef = useRef(null);

  useEffect(()=>{setYtErr(false);setCErr(false);setIdx(0);setOn(false);},[r.link,custom]);

  useEffect(()=>{
    clearInterval(intRef.current);
    if(!showYT||!on){setIdx(0);return;}
    const D=800,T=30; let e=0,c=0;
    intRef.current=setInterval(()=>{
      e+=T;
      if(barRef.current) barRef.current.style.width=`${((c+e/D)/N)*100}%`;
      if(e>=D){e=0;c=(c+1)%N;setIdx(c);}
    },T);
    return()=>clearInterval(intRef.current);
  },[on,vid,ytErr,custom]);

  const showC = !!(custom&&!cErr);
  const showYT= !showC&&!!(vid&&!ytErr);

  return (
    <div style={{position:"relative",height:160,background:"#1e293b",overflow:"hidden",flexShrink:0}}
      onMouseEnter={()=>showYT&&setOn(true)} onMouseLeave={()=>showYT&&setOn(false)}
      onTouchStart={()=>showYT&&setOn(true)} onTouchEnd={()=>showYT&&setOn(false)}>

      {showC && <img src={custom} alt="" onError={()=>setCErr(true)}
        style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>}

      {showYT && frames.map((f,i)=>(
        <FrameImg key={i} f={f} active={idx===i} setYtErr={setYtErr}/>
      ))}

      {!showC&&!showYT&&(
        <div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",
          flexDirection:"column",gap:6,background:"#f1f5f9"}}>
          <span style={{fontSize:44}}>{CE[r.cat]||"🍽️"}</span>
          {admin&&<span style={{fontSize:10,color:"#94a3b8"}}>kliknij 📷 aby dodać</span>}
        </div>
      )}

      {showYT&&<>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,.15)"}}>
          <div ref={barRef} style={{height:"100%",background:"#ef4444",
            width:`${((idx+1)/N)*100}%`,transition:on?"none":"width .2s"}}/>
        </div>
        <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
          display:"flex",gap:5,pointerEvents:"none"}}>
          {frames.map((_,i)=><div key={i} style={{width:idx===i?20:6,height:6,borderRadius:3,
            background:idx===i?"#ef4444":"rgba(255,255,255,.4)",transition:"all .25s"}}/>)}
        </div>
        {on&&<div style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,.7)",
          color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,
          backdropFilter:"blur(4px)"}}>{frames[idx]?.lbl}</div>}
      </>}

      {(showC||showYT)&&<div style={{position:"absolute",top:8,left:8,
        background:showC?"#6366f1":"#ef4444",color:"#fff",borderRadius:6,
        padding:"2px 6px",fontSize:9,fontWeight:800}}>
        {showC?"własne":"YT"}
      </div>}

      <a href={r.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,.65)",color:"#fff",
          borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,
          textDecoration:"none",backdropFilter:"blur(4px)"}}>▶</a>

      {admin&&<button onClick={e=>{e.stopPropagation();onPick();}}
        style={{position:"absolute",bottom:12,left:8,background:"rgba(99,102,241,.9)",
          color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,
          fontWeight:700,cursor:"pointer"}}>
        📷 {showC?"Zmień":"Dodaj"}
      </button>}
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ADD RECIPE MODAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function AddModal({onAdd, onClose}) {
  const [step,  setStep]  = useState(0); // 0=input 1=loading 2=preview 3=done
  const [url,   setUrl]   = useState("");
  const [err,   setErr]   = useState("");
  const [data,  setData]  = useState(null);
  const [name,  setName]  = useState("");
  const [cat,   setCat]   = useState("🥘 Wariacje");
  const [sk,    setSk]    = useState([]);
  const [note,  setNote]  = useState("dodane przez społeczność 🤝");
  const vid = ytId(url);

  const analyze = async () => {
    if(!url.trim()) return;
    setStep(1); setErr("");
    try {
      const res = await analyzeLink(url.trim());
      setData(res);
      setName(res.name||"");
      setCat(res.cat||"🥘 Wariacje");
      setSk(res.skladniki||[]);
      setStep(2);
    } catch(e) { setErr("Błąd: "+e.message); setStep(0); }
  };

  const submit = async () => {
    const recipe = {
      id:Date.now(), cat, name:name.trim(), link:url.trim(), note,
      wiki:"", q:data?.q||name.toLowerCase(), skladniki:sk.filter(s=>s.trim()),
      addedAt:new Date().toISOString(),
    };
    await onAdd(recipe);
    setStep(3);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800}}>{step===3?"✅ Dodano!":"🤖 Dodaj przepis"}</h2>
            <p style={{fontSize:12,color:"#94a3b8",marginTop:2}}>
              Wklej link → automatyczna analiza tytułu → edytuj → dodaj
            </p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {step===0&&<>
          <lbl>Link YouTube lub Facebook</lbl>
          <input value={url} onChange={e=>setUrl(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&analyze()}
            placeholder="https://youtube.com/shorts/... lub https://youtu.be/..."/>
          {vid&&<div style={{marginTop:10,borderRadius:8,overflow:"hidden",border:"2px solid #22c55e"}}>
            <img src={ytThumb(vid,"hqdefault")} alt="" style={{width:"100%",maxHeight:110,objectFit:"cover",display:"block"}}/>
            <div style={{fontSize:11,color:"#16a34a",padding:"4px 8px",background:"#f0fdf4",fontWeight:700}}>
              ✅ Link YouTube wykryty
            </div>
          </div>}
          {err&&<div style={{marginTop:10,padding:"10px 12px",background:"#fee2e2",
            borderRadius:8,fontSize:12,color:"#ef4444"}}>{err}</div>}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button className="btn btn-purple" style={{flex:1}} onClick={analyze} disabled={!url.trim()}>
              Analizuj tytuł →
            </button>
            <button className="btn btn-gray" onClick={onClose}>Anuluj</button>
          </div>
        </>}

        {step===1&&<div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{fontSize:52,marginBottom:12}} className="pulse">🔍</div>
          <div style={{fontWeight:700,fontSize:15}}>Analizuję link...</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:6}}>Pobieranie tytułu i dopasowanie kategorii</div>
        </div>}

        {step===2&&<>
          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,
            padding:"10px 12px",marginBottom:14,fontSize:12,color:"#166534"}}>
            ✅ Gotowe — sprawdź i popraw jeśli potrzeba:
          </div>
          <lbl>Nazwa przepisu</lbl>
          <input value={name} onChange={e=>setName(e.target.value)}/>
          <lbl>Kategoria</lbl>
          <select value={cat} onChange={e=>setCat(e.target.value)}>
            {CATS.map(c=><option key={c}>{c}</option>)}
          </select>
          <lbl>Notatka</lbl>
          <input value={note} onChange={e=>setNote(e.target.value)}/>
          <lbl>Składniki (jeden na linię)</lbl>
          <textarea rows={5} value={sk.join("\n")}
            onChange={e=>setSk(e.target.value.split("\n"))}
            style={{resize:"vertical",lineHeight:1.8}}/>
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button className="btn btn-green" style={{flex:1}} onClick={submit}
              disabled={!name.trim()}>
              ✅ Dodaj do bazy
            </button>
            <button className="btn btn-gray" onClick={()=>setStep(0)}>← Wróć</button>
          </div>
        </>}

        {step===3&&<div style={{textAlign:"center",padding:"32px 0"}}>
          <div style={{fontSize:56,marginBottom:12}}>🎉</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>Przepis dodany!</div>
          <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>
            Widoczny dla wszystkich odwiedzających
          </div>
          <button className="btn btn-purple" onClick={onClose}>Zamknij</button>
        </div>}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   IMAGE PICKER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function Picker({recipe, onPick, onClose}) {
  const [tab,  setTab]  = useState("youtube");
  const [q,    setQ]    = useState(recipe.q||recipe.name||"");
  const [imgs, setImgs] = useState([]);
  const [load, setLoad] = useState(false);
  const [err,  setErr]  = useState("");
  const [sel,  setSel]  = useState(null);
  const [url,  setUrl]  = useState("");
  const vid      = ytId(recipe.link);
  const ytThumbs = vid ? [
    {src:ytThumb(vid,"maxresdefault"),lbl:"Max"},
    {src:ytThumb(vid,"hqdefault"),    lbl:"HQ"},
    {src:ytThumb(vid,"mqdefault"),    lbl:"MQ"},
  ] : [];

  const search = async (src, query) => {
    setLoad(true); setErr(""); setImgs([]); setSel(null);
    try {
      let res=[];
      if(src==="wiki")    res=await imgWikimedia(query,recipe.wiki||"");
      if(src==="unsplash")res=await imgUnsplash(query);
      if(src==="pexels")  res=await imgPexels(query);
      setImgs(res);
      if(!res.length) setErr("Brak wyników — spróbuj innych słów.");
    } catch(e){setErr(e.message);}
    finally{setLoad(false);}
  };

  useEffect(()=>{ if(tab!=="youtube"&&tab!=="url") search(tab,q); },[tab]);

  const TABS=[
    {id:"youtube",lbl:"🎬 YouTube",free:true},
    {id:"wiki",   lbl:"🌐 Wiki",   free:true},
    {id:"unsplash",lbl:"📷 Unsplash",free:false},
    {id:"pexels", lbl:"🖼️ Pexels", free:false},
    {id:"url",    lbl:"🔗 URL",    free:true},
  ];

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="picker" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:17,fontWeight:800}}>📷 Wybierz zdjęcie</h2>
            <div style={{fontSize:12,color:"#64748b"}}>{recipe.name}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {/* tabs */}
        <div style={{display:"flex",gap:3,marginBottom:14,background:"#f1f5f9",borderRadius:12,padding:4}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"7px 4px",border:"none",borderRadius:8,cursor:"pointer",
                fontSize:12,fontWeight:700,whiteSpace:"nowrap",
                background:tab===t.id?"#fff":"transparent",
                color:tab===t.id?"#1e293b":"#64748b",
                boxShadow:tab===t.id?"0 1px 4px rgba(0,0,0,.1)":"none"}}>
              {t.lbl}{t.free&&<span style={{fontSize:8,color:"#16a34a",marginLeft:2}}>FREE</span>}
            </button>
          ))}
        </div>

        {/* youtube tab */}
        {tab==="youtube"&&(vid?<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
            {ytThumbs.map((t,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={t.src} className={"thumb-img"+(sel===i?" sel":"")}
                  style={{aspectRatio:"16/9"}} onClick={()=>setSel(i)}
                  onError={e=>e.target.closest("div").style.opacity=".3"}/>
                <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginTop:2}}>{t.lbl}</div>
                {sel===i&&<div style={{position:"absolute",top:4,left:4,background:"#22c55e",
                  borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800}}>✓</div>}
              </div>
            ))}
          </div>
        </>:<div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:13}}>
          ⚠️ Ten link nie ma miniatury YouTube.
        </div>)}

        {/* search tabs */}
        {["wiki","unsplash","pexels"].includes(tab)&&<>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={q} onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&search(tab,q)}
              placeholder="Szukaj po polsku lub angielsku..."/>
            <button className="btn btn-purple" onClick={()=>search(tab,q)}
              style={{whiteSpace:"nowrap"}}>🔍</button>
          </div>
          {load&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {Array(9).fill(0).map((_,i)=><div key={i} className="sk" style={{aspectRatio:"4/3",borderRadius:8}}/>)}
          </div>}
          {err&&<div style={{color:"#f59e0b",fontSize:13,padding:"10px 12px",
            background:"#fffbeb",borderRadius:8,marginBottom:8}}>{err}</div>}
          {!load&&imgs.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",
            gap:8,marginBottom:8}}>
            {imgs.map((img,i)=>(
              <div key={i} style={{position:"relative"}}>
                <img src={img.thumb} className={"thumb-img"+(sel===i?" sel":"")}
                  onClick={()=>setSel(i)}
                  onError={e=>e.target.closest("div").style.display="none"}/>
                {sel===i&&<div style={{position:"absolute",top:6,left:6,background:"#22c55e",
                  borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:14,color:"#fff",fontWeight:800}}>✓</div>}
              </div>
            ))}
          </div>}
        </>}

        {/* url tab */}
        {tab==="url"&&<div>
          <p style={{fontSize:13,color:"#475569",marginBottom:10,lineHeight:1.6}}>
            Znajdź zdjęcie na <b>kwestiasmaku.com</b> lub Google.<br/>
            <b>Prawy klik → "Kopiuj adres obrazu"</b> → wklej poniżej.
          </p>
          <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://..."/>
          {url&&<div style={{marginTop:10,borderRadius:10,overflow:"hidden",border:"2px solid #e2e8f0"}}>
            <img src={url} alt="podgląd" style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}
              onError={e=>e.target.style.display="none"}/>
          </div>}
        </div>}

        <div style={{display:"flex",gap:8,marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:14}}>
          {tab==="url"
            ?<button className="btn btn-green" style={{flex:1}} disabled={!url.trim()}
               onClick={()=>onPick(url.trim())}>✅ Ustaw URL</button>
            :<button className="btn btn-green" style={{flex:1}} disabled={sel===null}
               onClick={()=>{
                 if(tab==="youtube") onPick(ytThumbs[sel].src);
                 else onPick(imgs[sel].full);
               }}>✅ Ustaw zdjęcie</button>
          }
          <button className="btn btn-gray" onClick={onClose}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RECIPE EDIT MODAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function EditModal({recipe, onSave, onClose}) {
  const E={name:"",cat:"🐔 Kurczak",link:"",note:"",wiki:"",q:"",skladniki:[""]};
  const [f,setF]=useState(recipe?{...recipe,skladniki:[...recipe.skladniki]}:E);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const setSk=(i,v)=>setF(p=>{const a=[...p.skladniki];a[i]=v;return{...p,skladniki:a}});
  const addSk=()=>setF(p=>({...p,skladniki:[...p.skladniki,""]}));
  const delSk=i=>setF(p=>{const a=p.skladniki.filter((_,j)=>j!==i);return{...p,skladniki:a.length?a:[""]}});
  const submit=()=>{if(!f.name.trim())return alert("Podaj nazwę!");
    onSave({...f,skladniki:f.skladniki.filter(s=>s.trim())});};
  const vid=ytId(f.link);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800}}>{recipe?"✏️ Edytuj":"➕ Nowy przepis"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        <lbl>Nazwa *</lbl><input value={f.name} onChange={e=>s("name",e.target.value)}/>
        <lbl>Kategoria</lbl>
        <select value={f.cat} onChange={e=>s("cat",e.target.value)}>
          {CATS.map(c=><option key={c}>{c}</option>)}
        </select>
        <lbl>Link</lbl><input value={f.link} onChange={e=>s("link",e.target.value)} placeholder="https://..."/>
        {vid&&<div style={{marginTop:8,borderRadius:8,overflow:"hidden",border:"2px solid #22c55e"}}>
          <img src={ytThumb(vid,"hqdefault")} alt="" style={{width:"100%",maxHeight:90,objectFit:"cover",display:"block"}}/>
          <div style={{fontSize:11,color:"#16a34a",padding:"3px 8px",background:"#f0fdf4",fontWeight:700}}>✅ Miniatura YouTube</div>
        </div>}
        <lbl>Notatka</lbl><input value={f.note} onChange={e=>s("note",e.target.value)}/>
        <lbl>Wikipedia (opcjonalnie)</lbl><input value={f.wiki||""} onChange={e=>s("wiki",e.target.value)} placeholder="np. Zrazy"/>
        <lbl>Słowa do zdjęcia (ang.)</lbl><input value={f.q} onChange={e=>s("q",e.target.value)} placeholder="chicken teriyaki bowl"/>
        <lbl>Składniki</lbl>
        {f.skladniki.map((sk,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input value={sk} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>
            <button className="btn btn-sm btn-red" onClick={()=>delSk(i)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
        <button className="btn btn-sm btn-gray" onClick={addSk} style={{width:"100%",marginTop:4}}>+ Dodaj składnik</button>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button className="btn btn-purple" onClick={submit} style={{flex:1}}>{recipe?"💾 Zapisz":"➕ Dodaj"}</button>
          <button className="btn btn-gray" onClick={onClose}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SIMILAR RECIPES (YouTube)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function Similar({recipe}) {
  const [rows,  setRows]  = useState([]);
  const [load,  setLoad]  = useState(false);
  const [err,   setErr]   = useState("");
  const [lastId,setLastId]= useState(null);

  useEffect(()=>{
    if(!recipe||recipe.id===lastId) return;
    let dead=false;
    (async()=>{
      setLoad(true); setErr(""); setRows([]);
      try{
        let chMap=LS.get("yt_ch_cache",{});
        for(const ch of CFG.ytChannels){
          if(!chMap[ch.handle]){
            const id=await ytResolveHandle(ch.handle);
            if(id) chMap[ch.handle]=id;
          }
        }
        LS.set("yt_ch_cache",chMap);
        if(dead) return;
        const q=recipe.name.replace(/[^\w\sąćęłńóśźżĄĆĘŁŃÓŚŹŻ]/g,"").trim();
        const out=[];
        for(const ch of CFG.ytChannels){
          const cid=chMap[ch.handle]; if(!cid) continue;
          const vids=await ytSearchCh(q,cid);
          if(vids.length) out.push({label:ch.label,videos:vids});
          if(dead) return;
        }
        setRows(out); setLastId(recipe.id);
        if(!out.length) setErr("Brak wyników dla tego przepisu w wybranych kanałach.");
      }catch(e){if(!dead)setErr(e.message);}
      finally{if(!dead)setLoad(false);}
    })();
    return()=>{dead=true;};
  },[recipe?.id]);

  return (
    <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px 40px"}}>
      <div style={{borderTop:"2px solid #e2e8f0",paddingTop:24}}>
        <h2 style={{fontSize:18,fontWeight:800,marginBottom:6}}>📺 Podobne przepisy na YouTube</h2>
        {!recipe&&<div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:12,
          padding:"28px 20px",textAlign:"center",color:"#94a3b8"}}>
          <div style={{fontSize:28,marginBottom:8}}>👆</div>
          <div style={{fontWeight:600,color:"#64748b",fontSize:13}}>Kliknij przepis aby zobaczyć podobne filmy</div>
          <div style={{fontSize:12,marginTop:4}}>
            <b style={{color:"#6366f1"}}>thefoodini · Kocham Gotować · Mrgiboneg · Strzelczyk</b>
          </div>
        </div>}
        {recipe&&<>
          <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>
            „<b style={{color:"#475569"}}>{recipe.name}</b>"
          </p>
          {load&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {Array(8).fill(0).map((_,i)=><div key={i} className="sk" style={{borderRadius:12,height:130}}/>)}
          </div>}
          {err&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,
            padding:"12px 16px",fontSize:13,color:"#9a3412"}}>{err}</div>}
          {!load&&rows.map(row=>(
            <div key={row.label} style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#6366f1",marginBottom:10}}>
                <span style={{background:"#e0e7ff",borderRadius:6,padding:"2px 8px"}}>📺 {row.label}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                {row.videos.map(v=>(
                  <a key={v.id} href={v.url} target="_blank" rel="noreferrer"
                    style={{textDecoration:"none",borderRadius:12,overflow:"hidden",
                      background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,.08)",display:"block"}}>
                    <img src={v.thumb} alt={v.title}
                      style={{width:"100%",aspectRatio:"16/9",objectFit:"cover",display:"block"}}/>
                    <div style={{padding:"8px 10px 10px",fontSize:12,fontWeight:700,lineHeight:1.4,
                      display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                      {v.title}
                    </div>
                  </a>
                ))}
              </div>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   APP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function App() {
  const [custom,    setCustom]    = useState(()=>LS.get("img_v5",{}));
  const [community, setCommunity] = useState(()=>LS.get("comm_v1",[]));
  const [adminRecs, setAdminRecs] = useState(()=>LS.get("admin_v1",[]));
  const [activeCat, setActiveCat] = useState("Wszystkie");
  const [search,    setSearch]    = useState("");
  const [expanded,  setExpanded]  = useState(null);
  const [admin,     setAdmin]     = useState(false);
  const [editMod,   setEditMod]   = useState(null); // null | "new" | recipe
  const [picker,    setPicker]    = useState(null); // null | recipe
  const [addMod,    setAddMod]    = useState(false);
  const [loading,   setLoading]   = useState(true);

  useEffect(()=>LS.set("img_v5",custom),[custom]);
  useEffect(()=>LS.set("comm_v1",community),[community]);
  useEffect(()=>LS.set("admin_v1",adminRecs),[adminRecs]);

  // Load all recipes from Supabase once
  useEffect(()=>{
    sheetsLoad().then(data=>{
      setCommunity(data);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const all       = [...community, ...adminRecs];
  const commIds   = new Set(community.filter(r=>r.note&&r.note.includes("🤝")).map(r=>r.id));

  const handleAdd = async (recipe) => {
    setCommunity(p=>[...p,recipe]);
    await sheetsSave(recipe);
  };

  const handleSave = form => {
    if(editMod==="new") {
      setAdminRecs(p=>[...p,{...form,id:Date.now()}]);
    } else if(commIds.has(editMod.id)) {
      setCommunity(p=>p.map(r=>r.id===editMod.id?{...form,id:r.id}:r));
    } else {
      setAdminRecs(p=>p.map(r=>r.id===editMod.id?{...form,id:r.id}:r));
    }
    setEditMod(null);
  };

  const handleDelete = id => {
    if(commIds.has(id)) setCommunity(p=>p.filter(r=>r.id!==id));
    else setAdminRecs(p=>p.filter(r=>r.id!==id));
  };

  // Filter
  const cats = ["Wszystkie",...Array.from(new Set(all.map(r=>r.cat)))];
  const filtered = all.filter(r=>{
    const mc = activeCat==="Wszystkie"||r.cat===activeCat;
    const ms = r.name.toLowerCase().includes(search.toLowerCase())||
      (r.skladniki||[]).some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped = {};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const expandedRecipe = all.find(r=>r.id===expanded)||null;

  return (
    <div style={{minHeight:"100vh",paddingBottom:40}}>

      {/* ── Header ── */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"#fff",padding:"22px 20px 18px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
            gap:12,flexWrap:"wrap",marginBottom:14}}>
            <div>
              <h1 style={{fontSize:24,fontWeight:800,letterSpacing:"-.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{opacity:.6,fontSize:12,marginTop:3}}>
                {all.length} przepisów
                {community.length>0&&<span style={{marginLeft:8,background:"rgba(99,102,241,.3)",
                  borderRadius:10,padding:"1px 8px",fontSize:11}}>+{community.length} community</span>}
                {loading&&<span style={{marginLeft:8,opacity:.6,fontSize:11}}>⏳ ładuję bazę...</span>}
              </p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-purple" onClick={()=>setAddMod(true)}
                style={{boxShadow:"0 2px 8px rgba(99,102,241,.4)"}}>
                🤖 Dodaj przepis
              </button>
              {admin&&<button className="btn btn-green" onClick={()=>setEditMod("new")}>
                ✏️ Ręcznie
              </button>}
              <button className="btn" onClick={()=>setAdmin(a=>!a)}
                style={{background:admin?"#f59e0b":"rgba(255,255,255,.15)",
                  color:admin?"#1e293b":"#fff"}}>
                {admin?"✅ Edycja":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{borderColor:"transparent",fontSize:14,padding:"10px 14px",borderRadius:10}}/>
        </div>
      </div>

      {/* ── Kategorie ── */}
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",
                fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,.1)",
                color:activeCat===c?"#1e293b":"#fff"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* ── Karty ── */}
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0&&(
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40,fontSize:14}}>
            {search?"Brak wyników dla „"+search+""":" 😶 Brak przepisów"}
          </p>
        )}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:17,fontWeight:800,margin:"0 0 12px"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <Card key={r.id} r={r}
                  community={commIds.has(r.id)}
                  custom={custom[r.id]||""}
                  onPick={()=>setPicker(r)}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(p=>p===r.id?null:r.id)}
                  onEdit={()=>setEditMod(r)}
                  onDelete={()=>handleDelete(r.id)}
                  admin={admin}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* ── Similar YT ── */}
      <Similar recipe={expandedRecipe}/>

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8",paddingBottom:16}}>
        🤖 auto-analiza · 🎬 YT miniatury · 🌐 Wiki · 📷 Unsplash · 🖼️ Pexels · 💾 Google Sheets
      </p>

      {addMod  && <AddModal  onAdd={handleAdd}  onClose={()=>setAddMod(false)}/>}
      {editMod && <EditModal recipe={editMod==="new"?null:editMod} onSave={handleSave} onClose={()=>setEditMod(null)}/>}
      {picker  && <Picker    recipe={picker}     onPick={url=>{setCustom(p=>({...p,[picker.id]:url}));setPicker(null);}} onClose={()=>setPicker(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
