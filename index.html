/* ── Storage ───────────────────────────────────────────── */
const K_RECIPES = "przepisy_v2";
const K_KEY     = "unsplash_api_key";
const K_IMGS    = "unsplash_img_cache_v1";

const loadRecipes = () => { try { const d=localStorage.getItem(K_RECIPES); return d?JSON.parse(d):DEFAULT_RECIPES; } catch { return DEFAULT_RECIPES; }};
const saveRecipes = d => { try { localStorage.setItem(K_RECIPES,JSON.stringify(d)); } catch{} };
const loadKey     = () => localStorage.getItem(K_KEY)||"";
const saveKey     = k => localStorage.setItem(K_KEY,k.trim());
const loadImgs    = () => { try { return JSON.parse(localStorage.getItem(K_IMGS)||"{}"); } catch { return {}; }};
const saveImgs    = c => { try { localStorage.setItem(K_IMGS,JSON.stringify(c)); } catch{} };

/* ── Fetch one image URL from Unsplash API ─────────────── */
async function fetchImg(query, key) {
  const cache = loadImgs();
  if (cache[query]) return cache[query];
  try {
    const r = await fetch(
      `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=1&orientation=landscape&client_id=${key}`
    );
    if (!r.ok) return null;
    const d = await r.json();
    const url = d.results?.[0]?.urls?.small || null;
    if (url) { const c=loadImgs(); c[query]=url; saveImgs(c); }
    return url;
  } catch { return null; }
}

      <div style={{display:"flex",gap:8}}>

            borderRadius:8,fontSize:13,outline:"none",background:"#fffbeb"}}/>
        <button onClick={()=>k.trim()&&onSave(k.trim())}
          style={{background:"#f59e0b",color:"#1e293b",border:"none",
            borderRadius:8,padding:"9px 18px",fontWeight:800,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>
          Zapisz →
        </button>
      </div>
    </div>
  );
}

/* ── Recipe Image ──────────────────────────────────────── */
function RecipeImg({r, apiKey}) {
  const [src, setSrc] = useState(() => {
    if (!apiKey) return false;
    return loadImgs()[r.img] || null;
  });

  useEffect(() => {
    if (!apiKey) { setSrc(false); return; }
    const cached = loadImgs()[r.img];
    if (cached) { setSrc(cached); return; }
    setSrc(null);
    fetchImg(r.img, apiKey).then(url => setSrc(url||false));
  }, [r.img, apiKey]);

  return (
    <div style={{position:"relative",height:160,background:"#e2e8f0",flexShrink:0,overflow:"hidden"}}>
      {src === null &&
        <div className="skeleton" style={{position:"absolute",inset:0,height:160}}/>}
      {src === false &&
        <div style={{width:"100%",height:160,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:6,background:"#f1f5f9"}}>
          <span style={{fontSize:44}}>{catEmoji[r.cat]||"🍽️"}</span>
          {!apiKey && <span style={{fontSize:10,color:"#94a3b8",textAlign:"center",padding:"0 8px"}}>
            Dodaj klucz API aby załadować zdjęcia
          </span>}
        </div>}
      {src && <img src={src} alt={r.name}
        style={{width:"100%",height:160,objectFit:"cover",display:"block"}}
        onError={()=>setSrc(false)}/>}
      <a href={r.link} target="_blank" rel="noreferrer"
        onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.65)",
          color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:12,
          fontWeight:700,textDecoration:"none",backdropFilter:"blur(4px)"}}>
        ▶ Film
      </a>
    </div>
  );
}

function RecipeModal({recipe, onSave, onClose}) {
  const empty = {name:"",cat:"🐔 Kurczak",link:"",note:"",img:"food dish plate",skladniki:[""]};
  const [f, setF] = useState(recipe ? {...recipe,skladniki:[...recipe.skladniki]} : empty);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const setSk = (i,v) => setF(p=>{const s=[...p.skladniki];s[i]=v;return{...p,skladniki:s}});
  const addSk = () => setF(p=>({...p,skladniki:[...p.skladniki,""]}));
  const delSk = i => setF(p=>({...p,skladniki:p.skladniki.filter((_,j)=>j!==i).length?p.skladniki.filter((_,j)=>j!==i):[""] }));
  const submit = () => { if(!f.name.trim())return alert("Podaj nazwę!"); onSave({...f,skladniki:f.skladniki.filter(s=>s.trim())}); };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b"}}>{recipe?"✏️ Edytuj":"➕ Nowy przepis"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>
        <label>Nazwa dania *</label>
        <input type="text" value={f.name} onChange={e=>set("name",e.target.value)} placeholder="np. Kurczak w sosie cebulowym"/>
        <label>Kategoria</label>
        <select value={f.cat} onChange={e=>set("cat",e.target.value)}>
          {ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <label>Link do filmu</label>
        <input type="url" value={f.link} onChange={e=>set("link",e.target.value)} placeholder="https://youtube.com/shorts/..."/>
        <label>Notatka (opcjonalnie)</label>
        <input type="text" value={f.note} onChange={e=>set("note",e.target.value)} placeholder="np. Już robiony ✅"/>
        <label>Słowa kluczowe do zdjęcia (po angielsku)</label>
        <input type="text" value={f.img} onChange={e=>set("img",e.target.value)} placeholder="np. chicken teriyaki rice bowl sesame"/>
        <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>Opisz danie po angielsku → Unsplash dobierze pasujące zdjęcie</div>
        <label>Składniki</label>
        {f.skladniki.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input type="text" value={s} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>
            <button className="btn btn-danger btn-sm" onClick={()=>delSk(i)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
        <button className="btn btn-sm" onClick={addSk} style={{background:"#f1f5f9",color:"#475569",width:"100%",marginTop:4}}>+ Dodaj składnik</button>
        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button className="btn btn-primary" onClick={submit} style={{flex:1}}>{recipe?"💾 Zapisz":"➕ Dodaj"}</button>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ── Recipe Card ───────────────────────────────────────── */
function RecipeCard({r, expanded, onToggle, onEdit, onDelete, adminMode, apiKey}) {
  const b = catBorder[r.cat]||"#6366f1";
  return (
    <div onClick={onToggle}
      style={{background:catColors[r.cat]||"#fff",borderRadius:14,cursor:"pointer",overflow:"hidden",
        display:"flex",flexDirection:"column",
        border:`2px solid ${expanded?b:"transparent"}`,
        boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
      <RecipeImg r={r} apiKey={apiKey}/>
      <div style={{padding:"12px 14px 10px",flex:1}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",lineHeight:1.4}}>{r.name}</div>
        {r.note && <span style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.06)",
          padding:"2px 7px",borderRadius:10,display:"inline-block",marginTop:6}}>{r.note}</span>}
        <div style={{marginTop:8,fontSize:12,color:"#64748b"}}>{expanded?"▲ Zwiń":"▼ Składniki"}</div>
      </div>
      {expanded && (
        <div style={{padding:"0 14px 10px"}}>
          <div style={{background:"rgba(255,255,255,0.7)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Składniki:</div>
            {r.skladniki.map((s,i)=>(
              <div key={i} style={{fontSize:13,color:"#1e293b",padding:"3px 0",display:"flex",gap:6}}>
                <span style={{color:b,fontWeight:700,flexShrink:0}}>•</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}
      {adminMode && (
        <div style={{display:"flex",gap:6,padding:"0 14px 12px"}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-sm" onClick={onEdit} style={{flex:1,background:"#e0e7ff",color:"#4338ca"}}>✏️ Edytuj</button>
          <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm("Usunąć?"))onDelete()}} style={{flex:1}}>🗑️ Usuń</button>
        </div>
      )}
    </div>
  );
}

/* ── App ───────────────────────────────────────────────── */
function App() {
  const [recipes,   setRecipes]   = useState(loadRecipes);
  const [apiKey,    setApiKey]    = useState(loadKey);
  const [activeCat, setActiveCat] = useState("Wszystkie");
  const [expanded,  setExpanded]  = useState(null);
  const [search,    setSearch]    = useState("");
  const [adminMode, setAdminMode] = useState(false);
  const [modal,     setModal]     = useState(null);

  useEffect(()=>saveRecipes(recipes),[recipes]);

  const handleSetKey = k => { saveKey(k); setApiKey(k); };

  const clearImgCache = () => {
    localStorage.removeItem(K_IMGS);
    // force re-render of all images by changing key
    setApiKey(k=>k+" "); setTimeout(()=>setApiKey(k=>k.trim()),50);
    alert("Cache zdjęć wyczyszczony! Zdjęcia zostaną pobrane ponownie.");
  };

  const cats = ["Wszystkie", ...Array.from(new Set(recipes.map(r=>r.cat)))];

  const filtered = recipes.filter(r=>{
    const mc = activeCat==="Wszystkie"||r.cat===activeCat;
    const ms = r.name.toLowerCase().includes(search.toLowerCase())||
      r.skladniki.some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped = {};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const addOrUpdate = form => {
    if (modal==="new") setRecipes(rs=>[...rs,{...form,id:Math.max(0,...rs.map(r=>r.id))+1}]);
    else setRecipes(rs=>rs.map(r=>r.id===modal.id?{...form,id:r.id}:r));
    setModal(null);
  };

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"4px 0 0",opacity:.7,fontSize:13}}>{recipes.length} przepisów · ▶ Film → YouTube/FB</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              {adminMode && <>
                <button className="btn" onClick={()=>setModal("new")} style={{background:"#22c55e",color:"#fff"}}>➕ Nowy</button>
                <button className="btn btn-sm" onClick={clearImgCache} style={{background:"rgba(255,255,255,0.1)",color:"#fff"}}>🔄 Odśwież zdjęcia</button>
                {apiKey && <button className="btn btn-sm" onClick={()=>{saveKey("");setApiKey("");}} style={{background:"rgba(255,255,255,0.1)",color:"#fff"}}>🔑 Zmień klucz</button>}
              </>}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Tryb edycji ON":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",
              fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>

      {/* Category pills */}
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",
                fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Setup banner if no key */}
      {!apiKey && (
        <div style={{maxWidth:980,margin:"20px auto 0"}}>
          <SetupBanner onSave={handleSetKey}/>
        </div>
      )}

      {/* Cards */}
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0 &&
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>Brak wyników 😶</p>}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <RecipeCard key={r.id} r={r} apiKey={apiKey}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setModal(r)}
                  onDelete={()=>setRecipes(rs=>rs.filter(x=>x.id!==r.id))}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>
        Zdjęcia: Unsplash API · Dane zapisywane lokalnie w przeglądarce
      </p>

      {modal && <RecipeModal recipe={modal==="new"?null:modal} onSave={addOrUpdate} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
