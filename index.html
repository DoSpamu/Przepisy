/* ─── YouTube ID extractor ────────────── */
function getYTId(url) {
  if (!url) return null;
  // shorts: youtube.com/shorts/ID
  let m = url.match(/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // youtu.be/ID
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  // watch?v=ID
  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  return null;
}

function getYTThumbs(url) {
  const id = getYTId(url);
  if (!id) return [];
  return [
    { thumb: `https://img.youtube.com/vi/${id}/maxresdefault.jpg`, full: `https://img.youtube.com/vi/${id}/maxresdefault.jpg`, label: "Max (1280px)" },
    { thumb: `https://img.youtube.com/vi/${id}/sddefault.jpg`,     full: `https://img.youtube.com/vi/${id}/sddefault.jpg`,     label: "SD (640px)" },
    { thumb: `https://img.youtube.com/vi/${id}/hqdefault.jpg`,     full: `https://img.youtube.com/vi/${id}/hqdefault.jpg`,     label: "HQ (480px)" },
    { thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`,     full: `https://img.youtube.com/vi/${id}/mqdefault.jpg`,     label: "MQ (320px)" },
  ];
}

// HQ frame variants: try hq1/hq2/hq3 first (undocumented, 480px), fallback to 1/2/3 (120px)
function getYTFrames(id) {
  return [
    // frame 0: main thumbnail — try maxres → hq
    { hq: `https://img.youtube.com/vi/${id}/hqdefault.jpg`,
      fb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`,
      label: "okładka" },
    // frame 1: ~25%
    { hq: `https://img.youtube.com/vi/${id}/hq1.jpg`,
      fb: `https://img.youtube.com/vi/${id}/1.jpg`,
      label: "~25% 🎬" },
    // frame 2: ~50%
    { hq: `https://img.youtube.com/vi/${id}/hq2.jpg`,
      fb: `https://img.youtube.com/vi/${id}/2.jpg`,
      label: "~50% 🎬" },
    // frame 3: ~75%
    { hq: `https://img.youtube.com/vi/${id}/hq3.jpg`,
      fb: `https://img.youtube.com/vi/${id}/3.jpg`,
      label: "~75% 🎬" },
  ];
}

// Smart image with HQ → fallback chain
function YTFrame({src, fallback, style, onError}) {
  const [cur, setCur] = useState(src);
  useEffect(()=>setCur(src),[src]);
  return <img src={cur} style={style}
    onError={()=>{ if(cur===src && fallback) setCur(fallback); else onError&&onError(); }}
    alt=""/>;
}

// Auto-pick best available YT thumb (maxres → hq fallback)
function BestYTImg({ytId, style, onLoad, onError}) {
  const [src, setSrc] = useState(`https://img.youtube.com/vi/${ytId}/maxresdefault.jpg`);
  const [tried, setTried] = useState(0);
  const fallbacks = ["sddefault","hqdefault","mqdefault"];

  const handleErr = () => {
    if (tried < fallbacks.length) {
      setSrc(`https://img.youtube.com/vi/${ytId}/${fallbacks[tried]}.jpg`);
      setTried(t=>t+1);
    } else {
      onError && onError();
    }
  };
  return <img src={src} style={style} onLoad={onLoad} onError={handleErr} alt="miniatura"/>;
}

/* ─── Wikimedia ───────────────────────── */
async function fetchWikimedia(query, wikiTitle) {
  const results = [];
  if (wikiTitle) {
    try {
      const r = await fetch(`https://pl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=600&pilimit=1&origin=*`);
      const d = await r.json();
      const pg = Object.values(d?.query?.pages||{})[0];
      if (pg?.thumbnail?.source) results.push({thumb:pg.thumbnail.source,full:pg.thumbnail.source,title:"Wikipedia: "+wikiTitle});
    } catch{}
  }
  try {
    const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=15&format=json&origin=*`);
    const d = await r.json();
    const titles = (d?.query?.search||[]).map(s=>s.title);
    if (titles.length) {
      const r2 = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join("|"))}&prop=imageinfo&iiprop=url|thumburl|mime&iiurlwidth=400&format=json&origin=*`);
      const d2 = await r2.json();
      Object.values(d2?.query?.pages||{}).forEach(p=>{
        const mime=p.imageinfo?.[0]?.mime||"";
        if(mime.startsWith("image/")&&!mime.includes("svg")){
          const thumb=p.imageinfo?.[0]?.thumburl||p.imageinfo?.[0]?.url;
          const full=p.imageinfo?.[0]?.url;
          if(thumb) results.push({thumb,full,title:p.title?.replace("File:","")});
        }
      });
    }
  } catch{}
  return results;
}

async function fetchUnsplash(query, key) {
  if (!key) throw new Error("Brak klucza Unsplash API");
  const r = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape&client_id=${key}`);
  if (!r.ok) throw new Error("Błąd Unsplash ("+r.status+")");
  const d = await r.json();
  return (d.results||[]).map(p=>({thumb:p.urls.small,full:p.urls.regular,title:p.alt_description||""}));
}

async function fetchPexels(query, key) {
  if (!key) throw new Error("Brak klucza Pexels API");
  const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape`,{headers:{Authorization:key}});
  if (!r.ok) throw new Error("Błąd Pexels ("+r.status+")");
  const d = await r.json();
  return (d.photos||[]).map(p=>({thumb:p.src.medium,full:p.src.large,title:p.alt||""}));
}

/* ─── Card Image — filmstrip hover ───────── */
function CardImg({r, customUrl, adminMode, onPickRequest, onScrubRef}) {
  const ytId  = getYTId(r.link);
  const frames = ytId ? getYTFrames(ytId) : [];
  const N      = frames.length;

  const [idx,       setIdx]      = useState(0);
  const [hovered,   setHovered]  = useState(false);
  const [ytFailed,  setYtFailed] = useState(false);
  const [customErr, setCustomErr]= useState(false);
  const intervalRef  = React.useRef(null);
  const progressRef  = React.useRef(null);
  const touchScrubbing = React.useRef(false);
  const touchStartX    = React.useRef(0);

  useEffect(()=>{setYtFailed(false);setCustomErr(false);setIdx(0);},[r.link,customUrl]);

  const showCustom = customUrl && !customErr;
  const showYT     = !showCustom && ytId && !ytFailed;

  // Auto-cycle on hover (desktop)
  useEffect(()=>{
    if(!showYT||!hovered) {
      clearInterval(intervalRef.current);
      if(!hovered) setIdx(0);
      return;
    }
    const DURATION = 800;
    const TICK = 30;
    let elapsed = 0;
    let curFrame = 0;
    intervalRef.current = setInterval(()=>{
      elapsed += TICK;
      if(progressRef.current)
        progressRef.current.style.width = `${((curFrame+(elapsed/DURATION))/N)*100}%`;
      if(elapsed >= DURATION){
        elapsed = 0;
        curFrame = (curFrame+1)%N;
        setIdx(curFrame);
      }
    }, TICK);
    return ()=>clearInterval(intervalRef.current);
  },[hovered, showYT, N]);

  // ── Touch handlers ──────────────────────────
  const handleTouchStart = e => {
    if(!showYT) return;
    touchScrubbing.current = false;
    touchStartX.current = e.touches[0].clientX;
    // preload: show frame 0, don't prevent default yet
  };

  const handleTouchMove = e => {
    if(!showYT) return;
    const dx = Math.abs(e.touches[0].clientX - touchStartX.current);
    if(dx > 8) {
      e.preventDefault();
      e.stopPropagation();
      touchScrubbing.current = true;
      if(onScrubRef) onScrubRef.current = true;
      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      const zone = Math.min(N-1, Math.max(0, Math.floor((x/rect.width)*N)));
      setIdx(zone);
    }
  };

  const handleTouchEnd = e => {
    if(touchScrubbing.current) {
      e.preventDefault();
      e.stopPropagation();
      setTimeout(()=>{
        touchScrubbing.current = false;
        if(onScrubRef) onScrubRef.current = false;
        setIdx(0);
      }, 50);
    }
  };

  const badge = showCustom ? {label:"własne",bg:"#6366f1"}
              : showYT     ? {label:"▶ YT",  bg:"#ef4444"}
              : null;

  const labelText = frames[idx]?.label || "";

  return (
    <div
      style={{position:"relative",height:160,background:"#1e293b",
        overflow:"hidden",flexShrink:0,userSelect:"none"}}
      ref={containerRef}
      onMouseEnter={onMouseEnter}
      onMouseLeave={onMouseLeave}
    >
      {/* ── custom image ── */}
      {showCustom && (
        <img src={customUrl} alt={r.name} onError={()=>setCustomErr(true)}
          style={{width:"100%",height:160,objectFit:"cover",display:"block",
            transition:"opacity .3s"}}/>
      )}

      {/* ── YT frames: all rendered, cross-fade ── */}
      {showYT && frames.map((f,i)=>(
        <YTFrame key={i} src={f.hq} fallback={f.fb}
          style={{position:"absolute",inset:0,width:"100%",height:160,
            objectFit:"cover",display:"block",
            opacity: idx===i ? 1 : 0,
            transition:"opacity 0.2s ease"}}
          onError={()=>{ if(i===0) setYtFailed(true); }}/>
      ))}

      {/* ── empty ── */}
      {!showCustom && !showYT && (
        <div style={{height:160,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",gap:6,background:"#f1f5f9"}}>
          <span style={{fontSize:44}}>{catEmoji[r.cat]||"🍽️"}</span>
          {adminMode&&<span style={{fontSize:10,color:"#94a3b8"}}>kliknij 📷 aby dodać</span>}
        </div>
      )}

      {/* ── filmstrip progress bar ── */}
      {showYT && (
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,
          background:"rgba(255,255,255,0.2)"}}>
          <div ref={progressRef}
            style={{height:"100%",background:"#ef4444",
              width: hovered ? undefined : `${((idx+1)/N)*100}%`,
              transition: hovered ? "none" : "width 0.2s"}}/>
        </div>
      )}

      {/* ── filmstrip dot indicators ── */}
      {showYT && (
        <div style={{position:"absolute",bottom:8,left:"50%",
          transform:"translateX(-50%)",display:"flex",gap:5,pointerEvents:"none"}}>
          {frames.map((_,i)=>(
            <div key={i} style={{
              width: idx===i ? 20 : 6,
              height:6,borderRadius:3,
              background: idx===i?"#ef4444":"rgba(255,255,255,0.5)",
              transition:"all 0.25s ease",boxShadow:"0 1px 3px rgba(0,0,0,0.5)"}}/>
          ))}
        </div>
      )}

      {showYT && (active||idx>0) && (
        <div style={{position:"absolute",top:8,left:8,
          background:"rgba(0,0,0,0.72)",color:"#fff",borderRadius:6,
          padding:"2px 8px",fontSize:10,fontWeight:700,
          backdropFilter:"blur(4px)"}}>
          {frames[idx]?.label||""}
        </div>
      )}

      {showYT && !active && idx===0 && (
        <div style={{position:"absolute",bottom:20,left:"50%",
          transform:"translateX(-50%)",
          background:"rgba(0,0,0,0.5)",color:"#fff",borderRadius:6,
          padding:"2px 8px",fontSize:9,fontWeight:600,
          whiteSpace:"nowrap",backdropFilter:"blur(4px)"}}>
          przewiń aby podejrzeć
        </div>
      )}

      {/* ── source badge ── */}
      {badge && (
        <div style={{position:"absolute",top:8,right:44,background:badge.bg,
          color:"#fff",borderRadius:6,padding:"2px 7px",
          fontSize:10,fontWeight:800,backdropFilter:"blur(4px)"}}>
          {badge.label}
        </div>
      )}

      <a href={r.link} target="_blank" rel="noreferrer"
        onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.65)",
          color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:12,
          fontWeight:700,textDecoration:"none",backdropFilter:"blur(4px)"}}>▶</a>

      {adminMode&&(
        <button onClick={e=>{e.stopPropagation();onPickRequest();}}
          style={{position:"absolute",bottom:14,left:8,
            background:"rgba(99,102,241,0.9)",color:"#fff",border:"none",
            borderRadius:8,padding:"5px 10px",fontSize:11,
            fontWeight:700,cursor:"pointer",backdropFilter:"blur(4px)"}}>
          📷 Zmień
        </button>
      )}
    </div>
  );
}

/* ─── Image Picker ────────────────────── */
function ImagePicker({recipe, keys, onPick, onClose}) {
  const [tab,      setTab]      = useState("youtube");
  const [query,    setQuery]    = useState(recipe.q);
  const [results,  setResults]  = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState("");
  const [selected, setSelected] = useState(null);
  const [manualUrl,setManual]   = useState("");

  const ytId = getYTId(recipe.link);
  const ytThumbs = getYTThumbs(recipe.link);

  const search = async (src, q) => {
    if (src==="youtube"||src==="manual") return;
    setLoading(true); setError(""); setResults([]); setSelected(null);
    try {
      let imgs=[];
      if(src==="wikimedia") imgs=await fetchWikimedia(q,recipe.wiki);
      else if(src==="unsplash") imgs=await fetchUnsplash(q,keys.unsplash);
      else if(src==="pexels")   imgs=await fetchPexels(q,keys.pexels);
      setResults(imgs);
      if(!imgs.length) setError("Brak wyników — spróbuj innych słów.");
    } catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  useEffect(()=>{ if(tab!=="youtube"&&tab!=="manual") search(tab,query); },[tab]);

  const TABS = [
    {id:"youtube",   label:"🎬 YouTube", free:true},
    {id:"wikimedia", label:"🌐 Wiki",    free:true},
    {id:"unsplash",  label:"📷 Unsplash",free:false},
    {id:"pexels",    label:"🖼️ Pexels",  free:false},
    {id:"manual",    label:"🔗 URL",     free:true},
  ];

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="picker-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>

            <h2 style={{fontSize:17,fontWeight:800,color:"#1e293b"}}>📷 Wybierz zdjęcie</h2>

          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {/* tabs */}
        <div style={{display:"flex",gap:3,marginBottom:14,background:"#f1f5f9",borderRadius:12,padding:4}}>
          {TABS.map(t=>(
            <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?"#fff":"transparent",
                color:tab===t.id?"#1e293b":"#64748b",
                boxShadow:tab===t.id?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {t.label}
              {t.free&&<span style={{fontSize:8,color:"#16a34a",marginLeft:2,fontWeight:900}}>FREE</span>}
            </button>
          ))}
        </div>

        {/* ── YouTube tab ── */}
        {tab==="youtube" && (

            {ytId ? (<>
              <div style={{fontSize:13,color:"#475569",marginBottom:12,padding:"8px 10px",
                background:"#fef9c3",borderRadius:8,border:"1px solid #fde68a"}}>
                🎬 Miniatura pobrana automatycznie z Twojego filmu YouTube — to dokładnie to danie!<br/>
                Wybierz jakość:
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
                {ytThumbs.map((t,i)=>(
                  <div key={i} style={{position:"relative"}}>
                    <img src={t.thumb} alt={t.label}
                      className={"thumb"+(selected===i?" sel":"")}

                    <div style={{fontSize:11,color:"#64748b",marginTop:3,textAlign:"center"}}>{t.label}</div>
                    {selected===i&&(

              <div style={{padding:"20px",textAlign:"center",color:"#94a3b8",fontSize:13}}>
                ⚠️ Ten przepis ma link do Facebooka — miniatura YouTube niedostępna.<br/>

              </div>

        {/* ── Search tabs (wiki/unsplash/pexels) ── */}
        {tab!=="youtube"&&tab!=="manual" && (<>

                  {selected===i&&(
                    <div style={{position:"absolute",top:6,left:6,background:"#22c55e",borderRadius:"50%",
                      width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:14,color:"#fff",fontWeight:800}}>✓</div>
                  )}
                </div>
              ))}
            </div>
          )}
        </>)}

        {/* ── Manual URL tab ── */}
        {tab==="manual"&&(
          <div>
            <p style={{fontSize:13,color:"#475569",marginBottom:10,lineHeight:1.6}}>
              Znajdź zdjęcie na <b>kwestiasmaku.com</b>, Google Images lub gdziekolwiek.<br/>

            </p>
            <input value={manualUrl} onChange={e=>setManual(e.target.value)} placeholder="https://..."/>
            {manualUrl&&(
              <div style={{marginTop:10,borderRadius:10,overflow:"hidden",border:"2px solid #e2e8f0"}}>
                <img src={manualUrl} alt="podgląd"
                  style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}
                  onError={e=>e.target.style.display="none"}/>
              </div>
            )}
          </div>
        )}

        {/* footer */}
        <div style={{display:"flex",gap:8,marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:14}}>
          {tab==="manual"
            ? <button className="btn btn-primary" style={{flex:1,opacity:!manualUrl?.4:1}}

                disabled={selected===null}
                onClick={()=>{
                  if(tab==="youtube") onPick(ytThumbs[selected].full);
                  else onPick(results[selected].full);
                }}>

              </button>
          }
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

          </div>
        )}
        <label>Notatka</label><input value={f.note} onChange={e=>set("note",e.target.value)}/>
        <label>Tytuł artykułu pl.Wikipedia (opcjonalnie)</label>
        <input value={f.wiki||""} onChange={e=>set("wiki",e.target.value)} placeholder="np. Zrazy, Gołąbki"/>
        <label>Słowa do szukania zdjęcia (fallback)</label>
        <input value={f.q} onChange={e=>set("q",e.target.value)} placeholder="np. kurczak sos cebulowy"/>
        <label>Składniki</label>
        {f.skladniki.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input value={s} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>
            <button className="btn btn-danger btn-sm" onClick={()=>delSk(i)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
        <button className="btn btn-sm" onClick={addSk}
          style={{background:"#f1f5f9",color:"#475569",width:"100%",marginTop:4}}>+ Dodaj składnik</button>
        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button className="btn btn-primary" onClick={submit} style={{flex:1}}>{recipe?"💾 Zapisz":"➕ Dodaj"}</button>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Card ────────────────────────────── */
function Card({r, expanded, onToggle, onEdit, onDelete, adminMode, customUrl, onPickRequest}) {
  const b = catBorder[r.cat]||"#6366f1";
  const cyclingRef = React.useRef({current: false});
  const handleToggle = () => { if(cyclingRef.current?.current) return; onToggle(); };
  return (
    <div onClick={handleToggle}
      style={{background:catColors[r.cat]||"#fff",borderRadius:14,cursor:"pointer",overflow:"hidden",
        display:"flex",flexDirection:"column",
        border:`2px solid ${expanded?b:"transparent"}`,
        boxShadow:"0 2px 10px rgba(0,0,0,0.08)"}}>
      <CardImg r={r} customUrl={customUrl} adminMode={adminMode}
        onPickRequest={onPickRequest} onScrubRef={cyclingRef}/>
      <div style={{padding:"12px 14px 10px",flex:1}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",lineHeight:1.4}}>{r.name}</div>
        {r.note&&<span style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.06)",
          padding:"2px 7px",borderRadius:10,display:"inline-block",marginTop:6}}>{r.note}</span>}
        <div style={{marginTop:8,fontSize:12,color:"#64748b"}}>{expanded?"▲ Zwiń":"▼ Składniki"}</div>
      </div>
      {expanded&&(
        <div style={{padding:"0 14px 10px"}}>
          <div style={{background:"rgba(255,255,255,0.7)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,
              textTransform:"uppercase",letterSpacing:".5px"}}>Składniki:</div>
            {r.skladniki.map((s,i)=>(
              <div key={i} style={{fontSize:13,color:"#1e293b",padding:"3px 0",display:"flex",gap:6}}>
                <span style={{color:b,fontWeight:700,flexShrink:0}}>•</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}
      {adminMode&&(
        <div style={{display:"flex",gap:6,padding:"0 14px 12px"}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-sm" onClick={onEdit}
            style={{flex:1,background:"#e0e7ff",color:"#4338ca"}}>✏️ Edytuj</button>
          <button className="btn btn-danger btn-sm"
            onClick={()=>confirm("Usunąć?")&&onDelete()} style={{flex:1}}>🗑️ Usuń</button>
        </div>
      )}
    </div>
  );
}

/* ─── App ─────────────────────────────── */
function App() {
  const [recipes,   setRecipes]   = useState(()=>gs(KR)||DR);
  const [chosen,    setChosen]    = useState(()=>gs(KI)||{});
  const [keys,      setKeys]      = useState(()=>gs(KK)||{unsplash:"",pexels:""});
  const [activeCat, setActiveCat] = useState("Wszystkie");
  const [expanded,  setExpanded]  = useState(null);
  const [search,    setSearch]    = useState("");
  const [adminMode, setAdminMode] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [picker,    setPicker]    = useState(null);
  const [keysModal, setKeysModal] = useState(false);

  useEffect(()=>ss(KR,recipes),[recipes]);
  useEffect(()=>ss(KI,chosen),[chosen]);
  useEffect(()=>ss(KK,keys),[keys]);

  const handlePick=(id,url)=>{setChosen(c=>({...c,[id]:url}));setPicker(null);};
  const addOrUpdate=form=>{
    if(editModal==="new") setRecipes(rs=>[...rs,{...form,id:Math.max(0,...rs.map(r=>r.id))+1}]);
    else setRecipes(rs=>rs.map(r=>r.id===editModal.id?{...form,id:r.id}:r));
    setEditModal(null);
  };

  const cats=["Wszystkie",...Array.from(new Set(recipes.map(r=>r.cat)))];
  const filtered=recipes.filter(r=>{
    const mc=activeCat==="Wszystkie"||r.cat===activeCat;
    const ms=r.name.toLowerCase().includes(search.toLowerCase())||
      r.skladniki.some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"4px 0 0",opacity:.7,fontSize:13}}>{recipes.length} przepisów · miniatury z YouTube automatycznie</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {adminMode&&<>
                <button className="btn" onClick={()=>setEditModal("new")} style={{background:"#22c55e",color:"#fff"}}>➕ Nowy</button>
                <button className="btn btn-sm" onClick={()=>setKeysModal(true)}
                  style={{background:"rgba(255,255,255,0.12)",color:"#fff"}}>🔑 Klucze API</button>
              </>}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Edycja ON":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          {adminMode&&(
            <div style={{marginTop:10,padding:"9px 12px",background:"rgba(239,68,68,0.15)",
              borderRadius:8,border:"1px solid rgba(239,68,68,0.3)",fontSize:12,color:"#fca5a5"}}>
              🎬 Miniatury YouTube ładują się automatycznie. Kliknij <b>📷 Zmień zdjęcie</b> aby wybrać inne źródło.
            </div>
          )}
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0&&
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>Brak wyników 😶</p>}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <Card key={r.id} r={r}
                  customUrl={chosen[r.id]||""}
                  onPickRequest={()=>setPicker(r)}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setEditModal(r)}
                  onDelete={()=>setRecipes(rs=>rs.filter(x=>x.id!==r.id))}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>
      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>
        🎬 Auto-miniatury YouTube · 🌐 Wikimedia · 📷 Unsplash · 🖼️ Pexels · 🔗 własny URL
      </p>
      {picker&&<ImagePicker recipe={picker} keys={keys}
        onPick={url=>handlePick(picker.id,url)} onClose={()=>setPicker(null)}/>}
      {editModal&&<RecipeModal recipe={editModal==="new"?null:editModal}
        onSave={addOrUpdate} onClose={()=>setEditModal(null)}/>}
      {keysModal&&<KeysModal keys={keys}
        onSave={k=>{setKeys(k);ss(KK,k);}} onClose={()=>setKeysModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
