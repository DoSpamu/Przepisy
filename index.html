async function sheetsLoad() {

async function fetchYTTitle(url) {
  try {
    const r = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if(r.ok) { const d = await r.json(); return d.title || ""; }
  } catch {}
  return "";
}

async function fetchYTTranscript(videoId) {
  // Serverless proxy — omija CORS, pobiera transkrypcję po stronie serwera
  try {
    const r = await fetch(`/api/transcript?videoId=${videoId}`);
    if (r.ok) {
      const d = await r.json();
      if (d.text) return d.text;
    }
  } catch {}
  return null;
}

{"name":"...","cat":"...","skladniki":["..."],"q":"...","kroki":["Krok 1: ...","Krok 2: ..."]}`;

/* ══════════════════════════════
   YOUTUBE HELPERS
══════════════════════════════ */
function getYTId(url) {
  if(!url) return null;
  let m;
  m = url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  return null;
}

function getYTFrames(id) {
  return [
    {hq:`https://img.youtube.com/vi/${id}/hqdefault.jpg`, fb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`, label:"okładka"},
    {hq:`https://img.youtube.com/vi/${id}/hq1.jpg`,       fb:`https://img.youtube.com/vi/${id}/1.jpg`,         label:"~25% 🎬"},
    {hq:`https://img.youtube.com/vi/${id}/hq2.jpg`,       fb:`https://img.youtube.com/vi/${id}/2.jpg`,         label:"~50% 🎬"},
    {hq:`https://img.youtube.com/vi/${id}/hq3.jpg`,       fb:`https://img.youtube.com/vi/${id}/3.jpg`,         label:"~75% 🎬"},
  ];
}

function getYTThumbs(url) {
  const id = getYTId(url); if(!id) return [];
  return [
    {thumb:`https://img.youtube.com/vi/${id}/maxresdefault.jpg`, full:`https://img.youtube.com/vi/${id}/maxresdefault.jpg`, label:"Max"},
    {thumb:`https://img.youtube.com/vi/${id}/hqdefault.jpg`,     full:`https://img.youtube.com/vi/${id}/hqdefault.jpg`,     label:"HQ"},
    {thumb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`,     full:`https://img.youtube.com/vi/${id}/mqdefault.jpg`,     label:"MQ"},
  ];
}

function YTFrame({src, fallback, style, onError}) {
  const [cur, setCur] = useState(src);
  useEffect(()=>setCur(src),[src]);
  return <img src={cur} style={style} alt=""
    onError={()=>{ if(cur===src && fallback) setCur(fallback); else onError&&onError(); }}/>;
}

/* ══════════════════════════════
   IMAGE SEARCH APIs
══════════════════════════════ */
async function fetchWikimedia(query, wikiTitle) {
  const results = [];
  if(wikiTitle) {
    try {
      const r = await fetch(`https://pl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=600&pilimit=1&origin=*`);
      const d = await r.json();
      const pg = Object.values(d?.query?.pages||{})[0];
      if(pg?.thumbnail?.source) results.push({thumb:pg.thumbnail.source, full:pg.thumbnail.source, title:"Wikipedia: "+wikiTitle});
    } catch {}
  }
  try {
    const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=15&format=json&origin=*`);
    const d = await r.json();
    const titles = (d?.query?.search||[]).map(s=>s.title);
    if(titles.length) {
      const r2 = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join("|"))}&prop=imageinfo&iiprop=url|thumburl|mime&iiurlwidth=400&format=json&origin=*`);
      const d2 = await r2.json();
      Object.values(d2?.query?.pages||{}).forEach(p=>{
        const mime = p.imageinfo?.[0]?.mime||"";
        if(mime.startsWith("image/") && !mime.includes("svg")) {
          const thumb = p.imageinfo?.[0]?.thumburl||p.imageinfo?.[0]?.url;
          const full  = p.imageinfo?.[0]?.url;
          if(thumb) results.push({thumb, full, title: p.title?.replace("File:","")});
        }
      });
    }
  } catch {}
  return results;
}

async function fetchUnsplash(query) {
  const r = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape&client_id=${API_UNSPLASH}`);
  if(!r.ok) throw new Error("Błąd Unsplash ("+r.status+")");
  const d = await r.json();
  return (d.results||[]).map(p=>({thumb:p.urls.small, full:p.urls.regular, title:p.alt_description||""}));
}

async function fetchPexels(query) {
  const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape`, {headers:{Authorization:API_PEXELS}});
  if(!r.ok) throw new Error("Błąd Pexels ("+r.status+")");
  const d = await r.json();
  return (d.photos||[]).map(p=>({thumb:p.src.medium, full:p.src.large, title:p.alt||""}));
}

async function resolveHandle(handle) {
  const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${API_YT}`);
  if(!r.ok) return null;
  const d = await r.json();
  return d.items?.[0]?.id || null;
}

async function ytSearch(query, channelId) {
  const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&channelId=${channelId}&type=video&maxResults=3&key=${API_YT}`);
  if(!r.ok) return [];
  const d = await r.json();
  return (d.items||[]).map(v=>({
    id:    v.id.videoId,
    title: v.snippet.title,
    thumb: v.snippet.thumbnails?.medium?.url||v.snippet.thumbnails?.default?.url,
    url:   `https://www.youtube.com/watch?v=${v.id.videoId}`,
  }));
}

/* ── CardImg ──────────────────── */
function CardImg({r, customUrl, adminMode, onPickRequest}) {
  const ytId   = getYTId(r.link);
  const frames = ytId ? getYTFrames(ytId) : [];
  const N      = frames.length;
  const [idx,     setIdx]    = useState(0);
  const [active,  setActive] = useState(false);
  const [ytFail,  setYtFail] = useState(false);
  const [custErr, setCustErr]= useState(false);
  const intRef  = useRef(null);
  const progRef = useRef(null);

  const showCustom = !!(customUrl && !custErr);
  const showYT     = !showCustom && !!(ytId && !ytFail);

  useEffect(()=>{setYtFail(false);setCustErr(false);setIdx(0);setActive(false);},[r.link,customUrl]);

  useEffect(()=>{
    clearInterval(intRef.current);
    if(!showYT || !active){ setIdx(0); return; }
    const DUR=800, TICK=30; let el=0, cur=0;
    intRef.current = setInterval(()=>{
      el+=TICK;
      if(progRef.current) progRef.current.style.width=`${((cur+(el/DUR))/N)*100}%`;
      if(el>=DUR){ el=0; cur=(cur+1)%N; setIdx(cur); }
    },TICK);
    return()=>clearInterval(intRef.current);
  },[active,showYT]);

  const badge = showCustom?{l:"własne",bg:"#6366f1"}:showYT?{l:"YT",bg:"#ef4444"}:null;

  return (
    <div style={{position:"relative",height:160,background:"#1e293b",overflow:"hidden",flexShrink:0}}
      onMouseEnter={()=>showYT&&setActive(true)}
      onMouseLeave={()=>showYT&&setActive(false)}
      onTouchStart={()=>showYT&&setActive(true)}
      onTouchEnd={()=>showYT&&setActive(false)}>

      {showCustom && <img src={customUrl} alt={r.name} onError={()=>setCustErr(true)}
        style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>}

      {showYT && frames.map((f,i)=>(
        <YTFrame key={i} src={f.hq} fallback={f.fb}
          onError={()=>{if(i===0)setYtFail(true);}}
          style={{position:"absolute",top:0,left:0,width:"100%",height:160,
            objectFit:"cover",display:"block",
            opacity:idx===i?1:0,transition:"opacity 0.25s ease"}}/>
      ))}

      {!showCustom && !showYT && (
        <div style={{height:160,display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",gap:6,background:"#f1f5f9"}}>
          <span style={{fontSize:44}}>{catEmoji[r.cat]||"🍽️"}</span>
          {adminMode&&<span style={{fontSize:10,color:"#94a3b8"}}>kliknij 📷 aby dodać</span>}
        </div>
      )}

      {showYT && (
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.15)"}}>
          <div ref={progRef} style={{height:"100%",background:"#ef4444",
            width:`${((idx+1)/N)*100}%`,transition:active?"none":"width 0.2s"}}/>
        </div>
      )}
      {showYT && (
        <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
          display:"flex",gap:5,pointerEvents:"none"}}>
          {frames.map((_,i)=>(
            <div key={i} style={{width:idx===i?20:6,height:6,borderRadius:3,
              background:idx===i?"#ef4444":"rgba(255,255,255,0.45)",
              transition:"all 0.25s"}}/>
          ))}
        </div>
      )}
      {showYT && active && (
        <div style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,0.7)",
          color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,
          backdropFilter:"blur(4px)"}}>
          {frames[idx]?.label||""}
        </div>
      )}
      {badge && (
        <div style={{position:"absolute",top:8,right:44,background:badge.bg,color:"#fff",
          borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:800,backdropFilter:"blur(4px)"}}>
          {badge.l}
        </div>
      )}
      <a href={r.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.65)",color:"#fff",
          borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,
          textDecoration:"none",backdropFilter:"blur(4px)"}}>▶</a>
      {adminMode && (
        <button onClick={e=>{e.stopPropagation();onPickRequest();}}
          style={{position:"absolute",bottom:12,left:8,background:"rgba(99,102,241,0.9)",
            color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,
            fontWeight:700,cursor:"pointer",backdropFilter:"blur(4px)"}}>
          📷 Zmień
        </button>
      )}
    </div>
  );
}

/* ── Add Recipe Modal (AI) ────── */
function AddModal({onAdd, onClose}) {
  const [step,      setStep]    = useState(0); // 0=url, 1=loading, 2=preview, 3=done
  const [url,       setUrl]     = useState("");
  const [error,     setError]   = useState("");
  const [data,      setData]    = useState(null);
  const [name,      setName]    = useState("");
  const [cat,       setCat]     = useState("🥘 Wariacje");
  const [sk,        setSk]      = useState([]);
  const [kroki,     setKroki]   = useState([]);
  const [note,      setNote]    = useState("");
  const [loadMsg,      setLoadMsg]   = useState("Analizuję przepis...");
  const [hadTranscript,setHadTrans]  = useState(false);

  const analyze = async () => {
    if(!url.trim()) return;
    setStep(1); setError("");
    try {
      setLoadMsg("Pobieranie tytułu...");
      const title = await fetchYTTitle(url);
      const ytId = getYTId(url);
      let transcript = null;
      if (ytId) {
        setLoadMsg("Pobieranie transkrypcji...");
        transcript = await fetchYTTranscript(ytId);
      }
      setHadTrans(!!transcript);
      setLoadMsg(transcript ? "Analizuję przepis z transkrypcją..." : "Analizuję przepis z Groq AI...");
      const result = await aiAnalyze(url, title, transcript);
      setData(result);
      setName(result.name||"");
      setCat(result.cat||"🥘 Wariacje");
      setSk(result.skladniki||[]);
      setKroki(result.kroki||[]);
      setNote("dodane przez społeczność 🤝");
      setStep(2);
    } catch(e) {
      setError("Błąd: "+e.message);
      setStep(0);
    }
  };

  const submit = async () => {
    const recipe = {
      id: Date.now(),
      cat, name, link: url, note,
      wiki:"", q: data?.q||name,
      skladniki: sk.filter(s=>s.trim()),
      kroki: kroki.filter(k=>k.trim()),
      addedAt: new Date().toISOString()
    };
    await onAdd(recipe);
    setStep(3);
  };

  const ytId = getYTId(url);

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b"}}>
              {step===3?"✅ Dodano!":"🤖 Dodaj przepis"}
            </h2>
            <p style={{fontSize:12,color:"#94a3b8",marginTop:2}}>
              AI automatycznie rozpozna kategorię i składniki
            </p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        {step===0 && (<>
          <label>Link YouTube lub Facebook</label>
          <input value={url} onChange={e=>setUrl(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&analyze()}
            placeholder="https://youtube.com/shorts/... lub https://youtu.be/..."/>
          {ytId && (
            <div style={{marginTop:10,borderRadius:8,overflow:"hidden",border:"2px solid #22c55e"}}>
              <img src={`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`} alt=""
                style={{width:"100%",maxHeight:110,objectFit:"cover",display:"block"}}/>
              <div style={{fontSize:11,color:"#16a34a",padding:"4px 8px",background:"#f0fdf4",fontWeight:700}}>
                ✅ Link YouTube wykryty
              </div>
            </div>
          )}
          {error && <div style={{marginTop:10,padding:"10px 12px",background:"#fee2e2",borderRadius:8,fontSize:12,color:"#ef4444"}}>{error}</div>}
          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button className="btn btn-primary" style={{flex:1}} onClick={analyze} disabled={!url.trim()}>
              🤖 Analizuj →
            </button>
            <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
          </div>
          <p style={{fontSize:11,color:"#94a3b8",marginTop:10,textAlign:"center"}}>
            Używa Groq AI (Llama 3.3 70B) — szybko i dokładnie
          </p>
        </>)}

        {step===1 && (
          <div style={{textAlign:"center",padding:"36px 0"}}>
            <div style={{fontSize:52,marginBottom:12}} className="pulse">🤖</div>
            <div style={{fontWeight:700,color:"#1e293b",fontSize:15,marginBottom:6}}>{loadMsg}</div>
            <div style={{fontSize:12,color:"#94a3b8"}}>Groq AI (Llama 3.3) — transkrypcja + składniki + przepis</div>

        )}

        {step===2 && (<>

            padding:"10px 12px",marginBottom:14,fontSize:12,color:"#166534"}}>

/* ── Similar Recipes (YouTube) ── */
function SimilarRecipes({recipe}) {
  const [rows,    setRows]   = useState([]);
  const [loading, setLoading]= useState(false);
  const [error,   setError]  = useState("");
  const [lastId,  setLastId] = useState(null);

  useEffect(()=>{
    if(!recipe || recipe.id===lastId) return;
    let cancelled=false;
    const run=async()=>{
      setLoading(true); setError(""); setRows([]);
      try {
        let chMap=gs(KCH)||{};
        for(const ch of YT_CHANNELS) {
          if(!chMap[ch.handle]) {
            const id=await resolveHandle(ch.handle);
            if(id) chMap[ch.handle]=id;
          }
        }
        ss(KCH,chMap);
        if(cancelled) return;
        const q=recipe.name.replace(/[🎬✅😄😅🍺]/g,"").trim();
        const out=[];
        for(const ch of YT_CHANNELS) {
          const cid=chMap[ch.handle]; if(!cid) continue;
          const vids=await ytSearch(q,cid);
          if(vids.length) out.push({label:ch.label,videos:vids});
          if(cancelled) return;
        }
        setRows(out); setLastId(recipe.id);
        if(!out.length) setError("Brak wyników dla tego przepisu.");
      } catch(e){ if(!cancelled) setError("Błąd: "+e.message); }
      finally{ if(!cancelled) setLoading(false); }
    };
    run();
    return()=>{cancelled=true;};
  },[recipe?.id]);

  return (
    <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px 32px"}}>
      <div style={{borderTop:"2px solid #e2e8f0",paddingTop:24}}>
        <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:4}}>
          📺 Podobne przepisy na YouTube
        </h2>
        {!recipe && (
          <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:12,
            padding:"28px 20px",textAlign:"center",color:"#94a3b8"}}>
            <div style={{fontSize:28,marginBottom:8}}>👆</div>
            <div style={{fontSize:13,fontWeight:600,color:"#64748b"}}>Kliknij przepis aby zobaczyć podobne filmy</div>
            <div style={{fontSize:12,marginTop:4}}>
              <b style={{color:"#6366f1"}}>thefoodini · Kocham Gotować · Mrgiboneg · Strzelczyk</b>
            </div>
          </div>
        )}
        {recipe && <>
          <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>
            „<b style={{color:"#475569"}}>{recipe.name}</b>"
          </p>
          {loading && (
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {Array(8).fill(0).map((_,i)=><div key={i} className="skeleton" style={{borderRadius:12,height:130}}/>)}
            </div>
          )}
          {error && <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,
            padding:"12px 16px",fontSize:13,color:"#9a3412"}}>{error}</div>}
          {!loading && rows.map(row=>(
            <div key={row.label} style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#6366f1",marginBottom:10}}>
                <span style={{background:"#e0e7ff",borderRadius:6,padding:"2px 8px"}}>📺 {row.label}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                {row.videos.map(v=>(
                  <a key={v.id} href={v.url} target="_blank" rel="noreferrer"
                    style={{textDecoration:"none",borderRadius:12,overflow:"hidden",
                      background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",display:"block"}}>
                    <img src={v.thumb} alt={v.title}
                      style={{width:"100%",aspectRatio:"16/9",objectFit:"cover",display:"block"}}/>
                    <div style={{padding:"8px 10px 10px",fontSize:12,fontWeight:700,color:"#1e293b",
                      lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,
                      WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                      {v.title}
                    </div>
                  </a>
                ))}
              </div>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

/* ── Batch Kroki Update Modal ── */
function BatchKrokiModal({recipes, onUpdate, onClose}) {
  const cancelRef = useRef(false);
  const [status,  setStatus]  = useState("idle"); // idle | running | done
  const [current, setCurrent] = useState(0);
  const [log,     setLog]     = useState([]);

  const toProcess = recipes.filter(r=>(!r.kroki||r.kroki.length===0)&&r.link);

  const run = async () => {
    cancelRef.current = false;
    setStatus("running"); setLog([]); setCurrent(0);
    let done = 0;
    for (const r of toProcess) {
      if(cancelRef.current) break;
      setLog(l=>[...l,{id:r.id,name:r.name,status:"loading"}]);
      try {
        const ytId = getYTId(r.link);
        const transcript = ytId ? await fetchYTTranscript(ytId) : null;
        const result = await aiAnalyze(r.link, r.name, transcript);
        const kroki = result.kroki||[];
        await sheetsUpdateKroki(r.id, kroki);
        onUpdate(r.id, kroki);
        setLog(l=>l.map(e=>e.id===r.id?{...e,status:"done",count:kroki.length,trans:!!transcript}:e));
      } catch(e) {
        setLog(l=>l.map(e=>e.id===r.id?{...e,status:"error",msg:e.message}:e));
      }
      done++;
      setCurrent(done);
    }
    setStatus("done");
  };

  const pct = toProcess.length ? Math.round((current/toProcess.length)*100) : 100;

  return (
    <div className="modal-bg" onClick={status==="running"?undefined:onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800}}>🔄 Uzupełnij kroki przepisów</h2>
          {status!=="running" && (
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
          )}
        </div>

        {status==="idle" && (
          toProcess.length===0
            ? <div style={{padding:"20px 0",textAlign:"center",color:"#22c55e",fontWeight:700,fontSize:15}}>
                ✅ Wszystkie przepisy mają już kroki przyrządzania!
              </div>
            : <>
                <div style={{fontSize:13,color:"#64748b",marginBottom:16,lineHeight:1.7}}>
                  Znaleziono <b style={{color:"#1e293b"}}>{toProcess.length} przepisów</b> bez kroków przyrządzania.<br/>
                  Groq AI pobierze transkrypcję z YouTube i wygeneruje kroki dla każdego z nich.
                </div>
                <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",marginBottom:16,maxHeight:180,overflowY:"auto"}}>
                  {toProcess.map(r=>(
                    <div key={r.id} style={{fontSize:12,color:"#475569",padding:"3px 0"}}>• {r.name}</div>
                  ))}
                </div>
                <button className="btn btn-primary" style={{width:"100%"}} onClick={run}>
                  🚀 Rozpocznij aktualizację ({toProcess.length} przepisów)
                </button>
              </>
        )}

        {(status==="running"||status==="done") && (<>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748b",marginBottom:4}}>
              <span>{current} / {toProcess.length} przepisów</span>
              <span style={{fontWeight:700,color:"#6366f1"}}>{pct}%</span>
            </div>
            <div style={{background:"#e2e8f0",borderRadius:8,height:8}}>
              <div style={{background:"#6366f1",height:8,borderRadius:8,transition:"width 0.4s",width:`${pct}%`}}/>
            </div>
          </div>
          <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,marginBottom:14}}>
            {log.map(e=>(
              <div key={e.id} style={{fontSize:12,padding:"6px 10px",borderRadius:8,display:"flex",gap:8,alignItems:"center",
                background:e.status==="done"?"#f0fdf4":e.status==="error"?"#fee2e2":"#f8fafc",
                color:e.status==="done"?"#166534":e.status==="error"?"#991b1b":"#64748b"}}>
                <span style={{flexShrink:0}}>
                  {e.status==="done"?"✅":e.status==="error"?"❌":<span className="pulse">⏳</span>}
                </span>
                <span style={{flex:1,fontWeight:600}}>{e.name}</span>
                {e.status==="done" && <span style={{flexShrink:0,fontSize:11,color:"#16a34a"}}>
                  {e.count} kroków {e.trans?"📝":""}
                </span>}
                {e.status==="error" && <span style={{flexShrink:0,fontSize:10}}>{e.msg}</span>}
              </div>
            ))}
          </div>
          {status==="done" && (
            <button className="btn btn-primary" style={{width:"100%"}} onClick={onClose}>
              ✅ Gotowe — zamknij
            </button>
          )}
        </>)}
      </div>
    </div>
  );
}

/* ══════════════════════════════
   APP
══════════════════════════════ */
function App() {
  const [chosen,       setChosen]      = useState(()=>gs(KI)||{});
  const [community,    setCommunity]   = useState([]);
  const [adminRecipes, setAdminRecipes]= useState(()=>gs("admin_r_v1")||[]);
  const [activeCat,    setActiveCat]   = useState("Wszystkie");
  const [expanded,     setExpanded]    = useState(null);
  const [search,       setSearch]      = useState("");
  const [adminMode,    setAdminMode]   = useState(false);
  const [editModal,    setEditModal]   = useState(null);
  const [picker,       setPicker]      = useState(null);
  const [showAdd,      setShowAdd]     = useState(false);
  const [showBatch,    setShowBatch]   = useState(false);
  const [loading,      setLoading]     = useState(true);

  useEffect(()=>ss(KI,chosen),[chosen]);
  useEffect(()=>ss("admin_r_v1",adminRecipes),[adminRecipes]);

  // Load all recipes from Supabase once
  useEffect(()=>{
    sheetsLoad().then(data=>{
      setCommunity(data);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const commIds = new Set(community.filter(r=>r.note&&r.note.includes("🤝")).map(r=>r.id));

  const handleAddCommunity = async (recipe) => {
    setCommunity(prev=>[...prev, recipe]);
    await sheetsSave(recipe);
  };

  const handlePick = (id, url) => { setChosen(c=>({...c,[id]:url})); setPicker(null); };

  const handleUpdateKroki = (id, kroki) => {
    setCommunity(rs=>rs.map(r=>r.id===id?{...r,kroki}:r));
    setAdminRecipes(rs=>rs.map(r=>r.id===id?{...r,kroki}:r));
  };

  const addOrUpdate = form => {
    if(editModal==="new") {
      setAdminRecipes(rs=>[...rs,{...form,id:Date.now()}]);
    } else if(commIds.has(editModal.id)) {
      setCommunity(rs=>rs.map(r=>r.id===editModal.id?{...form,id:r.id}:r));
    } else {
      setAdminRecipes(rs=>rs.map(r=>r.id===editModal.id?{...form,id:r.id}:r));
    }
    setEditModal(null);
  };

  const deleteRecipe = id => {
    if(commIds.has(id)) setCommunity(rs=>rs.filter(r=>r.id!==id));
    else setAdminRecipes(rs=>rs.filter(r=>r.id!==id));
  };

  const allRecipes = [...DR, ...adminRecipes, ...community];

  const cats = ["Wszystkie",...Array.from(new Set(allRecipes.map(r=>r.cat)))];
  const filtered = allRecipes.filter(r=>{
    const mc = activeCat==="Wszystkie"||r.cat===activeCat;
    const ms = r.name.toLowerCase().includes(search.toLowerCase())||
      (r.skladniki||[]).some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const expandedRecipe = allRecipes.find(r=>r.id===expanded)||null;

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"4px 0 0",opacity:.7,fontSize:13}}>
                {allRecipes.length} przepisów
                {commIds.size>0&&<span style={{marginLeft:8,background:"rgba(99,102,241,0.35)",
                  borderRadius:10,padding:"1px 8px",fontSize:11}}>+{commIds.size} community</span>}
                {loading&&<span style={{marginLeft:8,opacity:.6,fontSize:11}}>⏳ ładuję bazę...</span>}
              </p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <button className="btn" onClick={()=>setShowAdd(true)}
                style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",
                  boxShadow:"0 2px 8px rgba(99,102,241,0.4)"}}>
                🤖 Dodaj przepis
              </button>
              {adminMode && (
                <button className="btn" onClick={()=>setEditModal("new")}
                  style={{background:"#22c55e",color:"#fff"}}>✏️ Ręcznie</button>
              )}
              {adminMode && (
                <button className="btn" onClick={()=>setShowBatch(true)}
                  style={{background:"#f59e0b",color:"#1e293b"}}>🔄 Uzupełnij kroki</button>
              )}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",
                  color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Edycja ON":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",
              fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>

      {/* Kategorie */}
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",
                fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Karty */}
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0 && (
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>
            {loading?"⏳ Ładuję przepisy...":"Brak wyników 😶"}
          </p>
        )}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <Card key={r.id} r={r}
                  isCommunity={commIds.has(r.id)}
                  customUrl={chosen[r.id]||""}
                  onPickRequest={()=>setPicker(r)}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setEditModal(r)}
                  onDelete={()=>deleteRecipe(r.id)}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Similar */}
      <SimilarRecipes recipe={expandedRecipe}/>

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"0 0 20px"}}>
        🤖 Groq AI (Llama 3.3) · 📝 YT Transkrypcja · 🎬 YT miniatury · 🌐 Wiki · 📷 Unsplash · 🖼️ Pexels · 💾 Supabase
      </p>

      {/* Modals */}
      {showAdd   && <AddModal onAdd={handleAddCommunity} onClose={()=>setShowAdd(false)}/>}
      {picker    && <ImagePicker recipe={picker} onPick={url=>handlePick(picker.id,url)} onClose={()=>setPicker(null)}/>}
      {editModal && <RecipeModal recipe={editModal==="new"?null:editModal} onSave={addOrUpdate} onClose={()=>setEditModal(null)}/>}
      {showBatch && <BatchKrokiModal recipes={allRecipes} onUpdate={handleUpdateKroki} onClose={()=>setShowBatch(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
