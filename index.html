/* ─── YouTube ID extractor ───────────── */
function getYTId(url) {
  if(!url) return null;
  let m = url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1];
  m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);  if(m) return m[1];
  m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);       if(m) return m[1];
  return null;
}

function getYTThumbs(url) {
  const id = getYTId(url); if(!id) return [];
  return [
    {thumb:`https://img.youtube.com/vi/${id}/maxresdefault.jpg`,full:`https://img.youtube.com/vi/${id}/maxresdefault.jpg`,label:"Max"},
    {thumb:`https://img.youtube.com/vi/${id}/sddefault.jpg`,    full:`https://img.youtube.com/vi/${id}/sddefault.jpg`,    label:"SD"},
    {thumb:`https://img.youtube.com/vi/${id}/hqdefault.jpg`,    full:`https://img.youtube.com/vi/${id}/hqdefault.jpg`,    label:"HQ"},
    {thumb:`https://img.youtube.com/vi/${id}/mqdefault.jpg`,    full:`https://img.youtube.com/vi/${id}/mqdefault.jpg`,    label:"MQ"},
  ];
}

function getYTFrames(id) {
  return [

    {hq:`https://img.youtube.com/vi/${id}/hq3.jpg`,       fb:`https://img.youtube.com/vi/${id}/3.jpg`,         label:"~75% 🎬"},
  ];
}

function YTFrame({src, fallback, style, onError}) {
  const [cur, setCur] = useState(src);
  useEffect(()=>setCur(src),[src]);
  return <img src={cur} style={style} alt=""
    onError={()=>{ if(cur===src && fallback) setCur(fallback); else onError&&onError(); }}/>;
}

/* ─── Image search APIs ──────────────── */
async function fetchWikimedia(query, wikiTitle) {
  const results = [];
  if(wikiTitle) {
    try {
      const r = await fetch(`https://pl.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=600&pilimit=1&origin=*`);
      const d = await r.json();
      const pg = Object.values(d?.query?.pages||{})[0];
      if(pg?.thumbnail?.source) results.push({thumb:pg.thumbnail.source,full:pg.thumbnail.source,title:"Wikipedia: "+wikiTitle});
    } catch{}
  }
  try {
    const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=15&format=json&origin=*`);
    const d = await r.json();
    const titles = (d?.query?.search||[]).map(s=>s.title);
    if(titles.length) {
      const r2 = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles.join("|"))}&prop=imageinfo&iiprop=url|thumburl|mime&iiurlwidth=400&format=json&origin=*`);
      const d2 = await r2.json();
      Object.values(d2?.query?.pages||{}).forEach(p=>{
        const mime=p.imageinfo?.[0]?.mime||"";
        if(mime.startsWith("image/")&&!mime.includes("svg")){
          const thumb=p.imageinfo?.[0]?.thumburl||p.imageinfo?.[0]?.url;
          const full=p.imageinfo?.[0]?.url;
          if(thumb) results.push({thumb,full,title:p.title?.replace("File:","")});
        }
      });
    }
  } catch{}
  return results;
}

async function fetchUnsplash(query, key) {
  if(!key) throw new Error("Brak klucza Unsplash");
  const r = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape&client_id=${key}`);
  if(!r.ok) throw new Error("Błąd Unsplash ("+r.status+")");
  const d = await r.json();
  return (d.results||[]).map(p=>({thumb:p.urls.small,full:p.urls.regular,title:p.alt_description||""}));
}

async function fetchPexels(query, key) {
  if(!key) throw new Error("Brak klucza Pexels");
  const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=12&orientation=landscape`,{headers:{Authorization:key}});
  if(!r.ok) throw new Error("Błąd Pexels ("+r.status+")");
  const d = await r.json();
  return (d.photos||[]).map(p=>({thumb:p.src.medium,full:p.src.large,title:p.alt||""}));
}

async function resolveHandle(handle, key) {
  // YouTube API forHandle accepts handle with or without @
  const r = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=${encodeURIComponent(handle)}&key=${key}`
  );
  if(!r.ok) {
    const err = await r.json().catch(()=>({}));
    throw new Error(err?.error?.message || "HTTP "+r.status);
  }
  const d = await r.json();
  return d.items?.[0]?.id || null;
}

async function ytSearch(query, channelId, key) {
  const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&channelId=${channelId}&type=video&maxResults=3&key=${key}`);
  if(!r.ok) return [];
  const d = await r.json();
  return (d.items||[]).map(v=>({
    id:      v.id.videoId,
    title:   v.snippet.title,
    thumb:   v.snippet.thumbnails?.medium?.url||v.snippet.thumbnails?.default?.url,
    url:     `https://www.youtube.com/watch?v=${v.id.videoId}`,
  }));
}

/* ─── Card Image ─────────────────────── */
function CardImg({r, customUrl, adminMode, onPickRequest}) {
  const ytId   = getYTId(r.link);
  const frames = ytId ? getYTFrames(ytId) : [];
  const N      = frames.length;

  const [idx,      setIdx]      = useState(0);
  const [active,   setActive]   = useState(false);
  const [ytFailed, setYtFailed] = useState(false);
  const [custErr,  setCustErr]  = useState(false);
  const intervalRef = React.useRef(null);
  const progressRef = React.useRef(null);

  const showCustom = !!(customUrl && !custErr);
  const showYT     = !showCustom && !!(ytId && !ytFailed);

  useEffect(()=>{ setYtFailed(false); setCustErr(false); setIdx(0); setActive(false); },[r.link,customUrl]);

  useEffect(()=>{
    clearInterval(intervalRef.current);
    if(!showYT || !active){ setIdx(0); return; }
    const DURATION=800, TICK=30;
    let elapsed=0, cur=0;
    intervalRef.current = setInterval(()=>{
      elapsed += TICK;
      if(progressRef.current)
        progressRef.current.style.width = `${((cur+(elapsed/DURATION))/N)*100}%`;
      if(elapsed>=DURATION){ elapsed=0; cur=(cur+1)%N; setIdx(cur); }
    }, TICK);
    return ()=>clearInterval(intervalRef.current);
  },[active, showYT]);

  const start = ()=>{ if(showYT) setActive(true); };
  const stop  = ()=>{ if(showYT) setActive(false); };

  const badge = showCustom ? {l:"własne",bg:"#6366f1"} : showYT ? {l:"YT",bg:"#ef4444"} : null;

  return (
    <div style={{position:"relative",height:160,background:"#1e293b",overflow:"hidden",flexShrink:0}}
      onMouseEnter={start} onMouseLeave={stop}
      onTouchStart={start} onTouchEnd={stop}>

      {showCustom&&<img src={customUrl} alt={r.name} onError={()=>setCustErr(true)}
        style={{width:"100%",height:160,objectFit:"cover",display:"block"}}/>}

      {showYT&&frames.map((f,i)=>(
        <YTFrame key={i} src={f.hq} fallback={f.fb}
          onError={()=>{ if(i===0) setYtFailed(true); }}
          style={{position:"absolute",top:0,left:0,width:"100%",height:160,
            objectFit:"cover",display:"block",
            opacity:idx===i?1:0,transition:"opacity 0.25s ease"}}/>
      ))}

      {!showCustom&&!showYT&&(
        <div style={{height:160,display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",gap:6,background:"#f1f5f9"}}>
          <span style={{fontSize:44}}>{catEmoji[r.cat]||"🍽️"}</span>
          {adminMode&&<span style={{fontSize:10,color:"#94a3b8"}}>kliknij 📷 aby dodać</span>}
        </div>
      )}

      {showYT&&(
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.15)"}}>
          <div ref={progressRef} style={{height:"100%",background:"#ef4444",
            width:`${((idx+1)/N)*100}%`,transition:active?"none":"width 0.2s"}}/>
        </div>
      )}

      {showYT&&(
        <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
          display:"flex",gap:5,pointerEvents:"none"}}>
          {frames.map((_,i)=>(
            <div key={i} style={{width:idx===i?20:6,height:6,borderRadius:3,
              background:idx===i?"#ef4444":"rgba(255,255,255,0.45)",
              transition:"all 0.25s",boxShadow:"0 1px 3px rgba(0,0,0,0.5)"}}/>
          ))}
        </div>
      )}

      {showYT&&active&&(
        <div style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,0.7)",
          color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,
          backdropFilter:"blur(4px)"}}>
          {frames[idx]?.label||""}
        </div>
      )}

      {badge&&(
        <div style={{position:"absolute",top:8,right:44,background:badge.bg,color:"#fff",
          borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:800,backdropFilter:"blur(4px)"}}>
          {badge.l}
        </div>
      )}

      <a href={r.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.65)",color:"#fff",
          borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,
          textDecoration:"none",backdropFilter:"blur(4px)"}}>▶</a>

      {adminMode&&(
        <button onClick={e=>{e.stopPropagation();onPickRequest();}}
          style={{position:"absolute",bottom:12,left:8,background:"rgba(99,102,241,0.9)",
            color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,
            fontWeight:700,cursor:"pointer",backdropFilter:"blur(4px)"}}>
          📷 Zmień
        </button>
      )}
    </div>
  );
}

/* ─── Image Picker ───────────────────── */
function ImagePicker({recipe, keys, onPick, onClose}) {
  const [tab,      setTab]      = useState("youtube");
  const [query,    setQuery]    = useState(recipe.q);
  const [results,  setResults]  = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState("");
  const [selected, setSelected] = useState(null);
  const [manualUrl,setManual]   = useState("");
  const ytId    = getYTId(recipe.link);
  const ytThumbs= getYTThumbs(recipe.link);

  const search = async (src,q) => {
    if(src==="youtube"||src==="manual") return;
    setLoading(true); setError(""); setResults([]); setSelected(null);
    try {
      let imgs=[];
      if(src==="wikimedia") imgs=await fetchWikimedia(q,recipe.wiki);
      else if(src==="unsplash") imgs=await fetchUnsplash(q,keys.unsplash);
      else if(src==="pexels")   imgs=await fetchPexels(q,keys.pexels);
      setResults(imgs);
      if(!imgs.length) setError("Brak wyników — spróbuj innych słów.");
    } catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  };

  useEffect(()=>{ if(tab!=="youtube"&&tab!=="manual") search(tab,query); },[tab]);

  const TABS=[
    {id:"youtube",  label:"🎬 YouTube", free:true},
    {id:"wikimedia",label:"🌐 Wiki",    free:true},
    {id:"unsplash", label:"📷 Unsplash",free:false},
    {id:"pexels",   label:"🖼️ Pexels",  free:false},
    {id:"manual",   label:"🔗 URL",     free:true},
  ];

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="picker-modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:17,fontWeight:800,color:"#1e293b"}}>📷 Wybierz zdjęcie</h2>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{recipe.name}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        <div style={{display:"flex",gap:3,marginBottom:14,background:"#f1f5f9",borderRadius:12,padding:4}}>
          {TABS.map(t=>(
            <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?"#fff":"transparent",
                color:tab===t.id?"#1e293b":"#64748b",
                boxShadow:tab===t.id?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>
              {t.label}{t.free&&<span style={{fontSize:8,color:"#16a34a",marginLeft:2,fontWeight:900}}>FREE</span>}
            </button>
          ))}
        </div>

        {tab==="youtube"&&(
          ytId ? (<>
            <div style={{fontSize:13,color:"#475569",marginBottom:12,padding:"8px 10px",
              background:"#fef9c3",borderRadius:8,border:"1px solid #fde68a"}}>
              🎬 Miniatura z Twojego filmu — wybierz jakość:
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
              {ytThumbs.map((t,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <img src={t.thumb} alt={t.label} className={"thumb"+(selected===i?" sel":"")}
                    style={{aspectRatio:"16/9"}} onClick={()=>setSelected(i)}
                    onError={e=>e.target.closest("div").style.opacity=".3"}/>
                  <div style={{fontSize:11,color:"#64748b",marginTop:3,textAlign:"center"}}>{t.label}</div>
                  {selected===i&&<div style={{position:"absolute",top:6,left:6,background:"#22c55e",
                    borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:14,color:"#fff",fontWeight:800}}>✓</div>}
                </div>
              ))}
            </div>
          </>) : (
            <div style={{padding:"20px",textAlign:"center",color:"#94a3b8",fontSize:13}}>
              ⚠️ Ten przepis ma link do Facebooka — brak miniatury YouTube.<br/>Użyj innego źródła.
            </div>
          )
        )}

        {tab!=="youtube"&&tab!=="manual"&&(<>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input value={query} onChange={e=>setQuery(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&search(tab,query)} placeholder="Szukaj..."/>
            <button onClick={()=>search(tab,query)} className="btn btn-primary" style={{whiteSpace:"nowrap"}}>🔍</button>
          </div>
          {((tab==="unsplash"&&!keys.unsplash)||(tab==="pexels"&&!keys.pexels))&&(
            <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,
              padding:"10px 12px",fontSize:12,color:"#9a3412",marginBottom:8}}>
              ⚠️ Brak klucza API. Wejdź w ⚙️ → 🔑 Klucze API.
            </div>
          )}
          {loading&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {Array(9).fill(0).map((_,i)=><div key={i} className="skeleton" style={{aspectRatio:"4/3",borderRadius:8}}/>)}
          </div>}
          {error&&<div style={{color:"#f59e0b",fontSize:13,padding:"10px 12px",background:"#fffbeb",borderRadius:8,border:"1px solid #fde68a",marginBottom:8}}>{error}</div>}
          {!loading&&results.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
              {results.map((img,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <img src={img.thumb} alt="" className={"thumb"+(selected===i?" sel":"")}
                    onClick={()=>setSelected(i)}
                    onError={e=>e.target.closest("div").style.display="none"}/>
                  {selected===i&&<div style={{position:"absolute",top:6,left:6,background:"#22c55e",
                    borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:14,color:"#fff",fontWeight:800}}>✓</div>}
                </div>
              ))}
            </div>
          )}
        </>)}

        {tab==="manual"&&(
          <div>
            <p style={{fontSize:13,color:"#475569",marginBottom:10,lineHeight:1.6}}>
              Znajdź zdjęcie na <b>kwestiasmaku.com</b> lub Google Images.<br/>
              <b>Prawy klik → "Kopiuj adres obrazu"</b> → wklej poniżej.
            </p>
            <input value={manualUrl} onChange={e=>setManual(e.target.value)} placeholder="https://..."/>
            {manualUrl&&<div style={{marginTop:10,borderRadius:10,overflow:"hidden",border:"2px solid #e2e8f0"}}>
              <img src={manualUrl} alt="podgląd"
                style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}
                onError={e=>e.target.style.display="none"}/>
            </div>}
          </div>
        )}

        <div style={{display:"flex",gap:8,marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:14}}>
          {tab==="manual"
            ? <button className="btn btn-primary" style={{flex:1,opacity:!manualUrl?.4:1}}
                disabled={!manualUrl.trim()} onClick={()=>onPick(manualUrl.trim())}>✅ Ustaw URL</button>
            : <button className="btn btn-primary" style={{flex:1,opacity:selected===null?.4:1}}
                disabled={selected===null}
                onClick={()=>{ if(tab==="youtube") onPick(ytThumbs[selected].full); else onPick(results[selected].full); }}>
                ✅ Ustaw to zdjęcie
              </button>
          }
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Recipe Modal ───────────────────── */
function RecipeModal({recipe, onSave, onClose}) {
  const empty={name:"",cat:"🐔 Kurczak",link:"",note:"",wiki:"",q:"",skladniki:[""]};
  const [f,setF]=useState(recipe?{...recipe,skladniki:[...recipe.skladniki]}:empty);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setSk=(i,v)=>setF(p=>{const s=[...p.skladniki];s[i]=v;return{...p,skladniki:s}});
  const addSk=()=>setF(p=>({...p,skladniki:[...p.skladniki,""]}));
  const delSk=i=>setF(p=>{const s=p.skladniki.filter((_,j)=>j!==i);return{...p,skladniki:s.length?s:[""]}});
  const submit=()=>{if(!f.name.trim())return alert("Podaj nazwę!");onSave({...f,skladniki:f.skladniki.filter(s=>s.trim())});};
  const ytId=getYTId(f.link);

    <div className="modal-bg" onClick={onClose}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

          <img src={`https://img.youtube.com/vi/${ytId}/hqdefault.jpg`} alt="miniatura"

            ✅ Miniatura YouTube wykryta!

        </div>}
        <label>Notatka</label><input value={f.note} onChange={e=>set("note",e.target.value)}/>

        {f.skladniki.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input value={s} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>

          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

        <div style={{padding:"0 14px 10px"}}>
          <div style={{background:"rgba(255,255,255,0.7)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>Składniki:</div>
            {r.skladniki.map((s,i)=>(
              <div key={i} style={{fontSize:13,color:"#1e293b",padding:"3px 0",display:"flex",gap:6}}>
                <span style={{color:b,fontWeight:700,flexShrink:0}}>•</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}
      {adminMode&&(
        <div style={{display:"flex",gap:6,padding:"0 14px 12px"}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-sm" onClick={onEdit} style={{flex:1,background:"#e0e7ff",color:"#4338ca"}}>✏️ Edytuj</button>
          <button className="btn btn-danger btn-sm" onClick={()=>confirm("Usunąć?")&&onDelete()} style={{flex:1}}>🗑️ Usuń</button>
        </div>
      )}
    </div>
  );
}

/* ─── YouTube Banner (no key) ────────── */
function YTKeyBanner({onSave}) {
  const [k,setK]=useState("");
  return (
    <div style={{maxWidth:980,margin:"0 auto 20px",padding:"0 16px"}}>
      <div style={{background:"linear-gradient(135deg,#eff6ff,#dbeafe)",border:"2px solid #3b82f6",borderRadius:14,padding:20}}>
        <div style={{fontSize:18,marginBottom:8}}>📺 Podobne przepisy z YouTube</div>
        <p style={{fontSize:13,color:"#1e40af",lineHeight:1.7,marginBottom:12}}>
          Potrzebujesz <b>darmowego klucza YouTube Data API v3</b> (bez karty):
        </p>
        <ol style={{fontSize:13,color:"#1e40af",paddingLeft:18,lineHeight:2.2,marginBottom:12}}>
          <li>Wejdź na <a href="https://console.cloud.google.com" target="_blank" style={{color:"#1d4ed8",fontWeight:700}}>console.cloud.google.com</a></li>
          <li>Nowy projekt → <b>Włącz interfejsy API</b> → <b>YouTube Data API v3</b> → Włącz</li>
          <li><b>Dane logowania</b> → Utwórz dane → <b>Klucz API</b> → skopiuj</li>
          <li>Wklej poniżej →</li>
        </ol>
        <div style={{fontSize:12,color:"#3b82f6",marginBottom:10}}>💡 Darmowy limit: ~100 wyszukań/dzień</div>
        <div style={{display:"flex",gap:8}}>
          <input value={k} onChange={e=>setK(e.target.value)} placeholder="Wklej klucz YouTube Data API v3..."
            style={{flex:1,border:"2px solid #3b82f6",background:"#eff6ff",padding:"9px 12px",borderRadius:8}}/>
          <button onClick={()=>k.trim()&&onSave(k.trim())}
            style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,
              padding:"9px 18px",fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>Zapisz →</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Similar Recipes ────────────────── */
function SimilarRecipes({recipe, ytKey}) {
  const [rows,     setRows]    = useState([]);
  const [loading,  setLoading] = useState(false);
  const [error,    setError]   = useState("");
  const [lastId,   setLastId]  = useState(null);

  useEffect(()=>{
    if(!ytKey||!recipe||recipe.id===lastId) return;
    let cancelled=false;
    const run = async ()=>{
      setLoading(true); setError(""); setRows([]);
      try {
        let chMap = gs(KCH)||{};
        for(const ch of YT_CHANNELS) {
          if(!chMap[ch.handle]) {
            const id = await resolveHandle(ch.handle, ytKey);
            if(id) chMap[ch.handle]=id;
          }
        }
        ss(KCH, chMap);
        if(cancelled) return;
        const q = recipe.name.replace(/[🎬✅😄😅🍺]/g,"").trim();
        const out=[];
        for(const ch of YT_CHANNELS) {
          const cid=chMap[ch.handle]; if(!cid) continue;
          const vids=await ytSearch(q,cid,ytKey);
          if(vids.length) out.push({label:ch.label,videos:vids});
          if(cancelled) return;
        }
        setRows(out); setLastId(recipe.id);
        if(!out.length) setError("Brak wyników dla tego przepisu w wybranych kanałach.");
      } catch(e){ if(!cancelled) setError("Błąd API: "+e.message); }
      finally{ if(!cancelled) setLoading(false); }
    };
    run();
    return()=>{cancelled=true;};
  },[recipe?.id, ytKey]);

  if(!ytKey) return null;

  if(!recipe) return (
    <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px 32px"}}>
      <div style={{borderTop:"2px solid #e2e8f0",paddingTop:24}}>
        <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:8}}>📺 Podobne przepisy na YouTube</h2>
        <div style={{background:"#f8fafc",border:"2px dashed #e2e8f0",borderRadius:12,
          padding:"32px 20px",textAlign:"center",color:"#94a3b8"}}>
          <div style={{fontSize:32,marginBottom:8}}>👆</div>
          <div style={{fontSize:14,fontWeight:600,color:"#64748b"}}>Kliknij dowolny przepis powyżej</div>
          <div style={{fontSize:12,marginTop:4}}>aby zobaczyć podobne filmy z kanałów:<br/>
            <b style={{color:"#6366f1"}}>thefoodini · Kocham Gotować · Mrgiboneg · Strzelczyk</b>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px 32px"}}>
      <div style={{borderTop:"2px solid #e2e8f0",paddingTop:24}}>
        <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:4}}>📺 Podobne przepisy na YouTube</h2>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>
          „<b style={{color:"#475569"}}>{recipe.name}</b>" — thefoodini · Kocham Gotować · Mrgiboneg · Strzelczyk
        </p>
        {loading&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
            {Array(8).fill(0).map((_,i)=><div key={i} className="skeleton" style={{borderRadius:12,height:140}}/>)}
          </div>
        )}
        {error&&<div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#9a3412"}}>{error}</div>}
        {!loading&&rows.map(row=>(
          <div key={row.label} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:700,color:"#6366f1",marginBottom:10}}>
              <span style={{background:"#e0e7ff",borderRadius:6,padding:"2px 8px"}}>📺 {row.label}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {row.videos.map(v=>(
                <a key={v.id} href={v.url} target="_blank" rel="noreferrer"
                  style={{textDecoration:"none",borderRadius:12,overflow:"hidden",
                    background:"#fff",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",display:"block"}}>
                  <img src={v.thumb} alt={v.title} style={{width:"100%",aspectRatio:"16/9",objectFit:"cover",display:"block"}}/>
                  <div style={{padding:"8px 10px 10px",fontSize:12,fontWeight:700,color:"#1e293b",
                    lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,
                    WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                    {v.title}
                  </div>
                </a>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── App ────────────────────────────── */
function App() {
  const [recipes,   setRecipes]  = useState(()=>gs(KR)||DR);
  const [chosen,    setChosen]   = useState(()=>gs(KI)||{});
  const [keys,      setKeys]     = useState(()=>gs(KK)||{unsplash:"",pexels:""});
  const [ytKey,     setYtKey]    = useState(()=>gs(KYT)||"");
  const [activeCat, setActiveCat]= useState("Wszystkie");
  const [expanded,  setExpanded] = useState(null);
  const [search,    setSearch]   = useState("");
  const [adminMode, setAdminMode]= useState(false);
  const [editModal, setEditModal]= useState(null);
  const [picker,    setPicker]   = useState(null);
  const [keysModal, setKeysModal]= useState(false);

  useEffect(()=>ss(KR,recipes),[recipes]);
  useEffect(()=>ss(KI,chosen),[chosen]);
  useEffect(()=>ss(KK,keys),[keys]);
  useEffect(()=>ss(KYT,ytKey),[ytKey]);

  const handlePick=(id,url)=>{setChosen(c=>({...c,[id]:url}));setPicker(null);};
  const addOrUpdate=form=>{
    if(editModal==="new") setRecipes(rs=>[...rs,{...form,id:Math.max(0,...rs.map(r=>r.id))+1}]);
    else setRecipes(rs=>rs.map(r=>r.id===editModal.id?{...form,id:r.id}:r));
    setEditModal(null);
  };

  const cats=["Wszystkie",...Array.from(new Set(recipes.map(r=>r.cat)))];
  const filtered=recipes.filter(r=>{
    const mc=activeCat==="Wszystkie"||r.cat===activeCat;
    const ms=r.name.toLowerCase().includes(search.toLowerCase())||
      r.skladniki.some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc&&ms;
  });
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const expandedRecipe = recipes.find(r=>r.id===expanded)||null;

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"4px 0 0",opacity:.7,fontSize:13}}>{recipes.length} przepisów</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {adminMode&&<>
                <button className="btn" onClick={()=>setEditModal("new")} style={{background:"#22c55e",color:"#fff"}}>➕ Nowy</button>
                <button className="btn btn-sm" onClick={()=>setKeysModal(true)} style={{background:"rgba(255,255,255,0.12)",color:"#fff"}}>🔑 Klucze API</button>
                {ytKey&&<button className="btn btn-sm" onClick={()=>{ss(KYT,"");setYtKey("");}} style={{background:"rgba(255,255,255,0.12)",color:"#fff"}}>📺 Zmień YT klucz</button>}
              </>}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Edycja ON":"⚙️ Edytuj"}
              </button>
            </div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>

      {/* Kategorie */}
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Karty */}
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0&&<p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>Brak wyników 😶</p>}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <Card key={r.id} r={r}
                  customUrl={chosen[r.id]||""}
                  onPickRequest={()=>setPicker(r)}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setEditModal(r)}
                  onDelete={()=>setRecipes(rs=>rs.filter(x=>x.id!==r.id))}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Similar Recipes */}
      {ytKey
        ? <SimilarRecipes recipe={expandedRecipe} ytKey={ytKey}/>
        : <YTKeyBanner onSave={k=>{ss(KYT,k);setYtKey(k);}}/>
      }

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"0 0 16px"}}>
        Zdjęcia: 🎬 YT · 🌐 Wiki · 📷 Unsplash · 🖼️ Pexels · 🔗 URL · Dane w localStorage
      </p>

      {picker&&<ImagePicker recipe={picker} keys={keys} onPick={url=>handlePick(picker.id,url)} onClose={()=>setPicker(null)}/>}
      {editModal&&<RecipeModal recipe={editModal==="new"?null:editModal} onSave={addOrUpdate} onClose={()=>setEditModal(null)}/>}
      {keysModal&&<KeysModal keys={keys} onSave={k=>{setKeys(k);ss(KK,k);}} onClose={()=>setKeysModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
