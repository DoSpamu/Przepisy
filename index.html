    textarea,input[type=text],input[type=url],select{

const STORAGE_KEY = "przepisy_v1";

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : DEFAULT_RECIPES; }
  catch { return DEFAULT_RECIPES; }
}
function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function RecipeImg({r}) {
  const [status, setStatus] = useState("loading");
  const url = `https://source.unsplash.com/400x220/?${encodeURIComponent(r.img)}&sig=${r.id}`;
  return (
    <div style={{position:"relative",overflow:"hidden",height:160,background:"#e2e8f0",flexShrink:0}}>
      {status==="loading" && <div className="skeleton" style={{position:"absolute",inset:0}}/>}
      {status!=="err"
        ? <img src={url} alt={r.name}
            style={{width:"100%",height:160,objectFit:"cover",display:status==="ok"?"block":"none"}}
            onLoad={()=>setStatus("ok")} onError={()=>setStatus("err")}/>
        : <div style={{width:"100%",height:160,display:"flex",alignItems:"center",justifyContent:"center",fontSize:52}}>{catEmoji[r.cat]||"🍽️"}</div>
      }
      <a href={r.link} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
        style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.62)",color:"#fff",
          borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,textDecoration:"none",backdropFilter:"blur(4px)"}}>
        ▶ Film
      </a>
    </div>
  );
}

// ── Modal dodaj/edytuj ──────────────────────────────────────────────
function RecipeModal({recipe, onSave, onClose}) {
  const empty = {name:"",cat:"🐔 Kurczak",link:"",note:"",img:"food dish",skladniki:[""]};
  const [form, setForm] = useState(recipe ? {...recipe, skladniki:[...recipe.skladniki]} : empty);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const setSk = (i,v) => setForm(f=>{const s=[...f.skladniki];s[i]=v;return{...f,skladniki:s}});
  const addSk = () => setForm(f=>({...f,skladniki:[...f.skladniki,""]}));
  const delSk = i => setForm(f=>{const s=f.skladniki.filter((_,j)=>j!==i);return{...f,skladniki:s.length?s:[""]}});

  const submit = () => {
    if (!form.name.trim()) return alert("Podaj nazwę przepisu!");
    onSave({...form, skladniki: form.skladniki.filter(s=>s.trim())});
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b"}}>{recipe?"✏️ Edytuj przepis":"➕ Nowy przepis"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8"}}>✕</button>
        </div>

        <label>Nazwa dania *</label>
        <input type="text" value={form.name} onChange={e=>setF("name",e.target.value)} placeholder="np. Kurczak w sosie cebulowym"/>

        <label>Kategoria</label>
        <select value={form.cat} onChange={e=>setF("cat",e.target.value)}>
          {ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>

        <label>Link do filmu (YouTube / Facebook)</label>
        <input type="url" value={form.link} onChange={e=>setF("link",e.target.value)} placeholder="https://youtube.com/shorts/..."/>

        <label>Notatka (opcjonalnie)</label>
        <input type="text" value={form.note} onChange={e=>setF("note",e.target.value)} placeholder="np. Styczeń 2026, już robiony ✅"/>

        <label>Słowa kluczowe do zdjęcia (po angielsku)</label>
        <input type="text" value={form.img} onChange={e=>setF("img",e.target.value)} placeholder="np. chicken teriyaki rice sesame"/>
        <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>Wpisz angielskie słowa opisujące danie → Unsplash dobierze zdjęcie</div>

        <label>Składniki</label>
        {form.skladniki.map((s,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:5}}>
            <input type="text" value={s} onChange={e=>setSk(i,e.target.value)} placeholder={`Składnik ${i+1}`}/>
            <button className="btn btn-danger btn-sm" onClick={()=>delSk(i)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
        <button className="btn" onClick={addSk}
          style={{marginTop:4,background:"#f1f5f9",color:"#475569",width:"100%"}}>+ Dodaj składnik</button>

        <div style={{display:"flex",gap:8,marginTop:20}}>
          <button className="btn btn-primary" onClick={submit} style={{flex:1}}>
            {recipe?"💾 Zapisz zmiany":"➕ Dodaj przepis"}
          </button>
          <button className="btn" onClick={onClose} style={{background:"#f1f5f9",color:"#475569"}}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{background:catColors[r.cat]||"#fff",borderRadius:14,
      border:`2px solid ${expanded?border:"transparent"}`,
      boxShadow:"0 2px 10px rgba(0,0,0,0.08)",overflow:"hidden",
      display:"flex",flexDirection:"column",cursor:"pointer"}}
      onClick={onToggle}>
      <RecipeImg r={r}/>
      <div style={{padding:"12px 14px 10px",flex:1}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1e293b",lineHeight:1.4}}>{r.name}</div>
        {r.note && <span style={{fontSize:11,color:"#64748b",background:"rgba(0,0,0,0.06)",
          padding:"2px 7px",borderRadius:10,display:"inline-block",marginTop:6}}>{r.note}</span>}
        <div style={{marginTop:8,fontSize:12,color:"#64748b",userSelect:"none"}}>
          {expanded?"▲ Zwiń składniki":"▼ Pokaż składniki"}
        </div>
      </div>
      {expanded && (
        <div style={{padding:"0 14px 10px"}}>
          <div style={{background:"rgba(255,255,255,0.7)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Składniki:</div>
            {r.skladniki.map((s,i)=>(
              <div key={i} style={{fontSize:13,color:"#1e293b",padding:"3px 0",display:"flex",gap:6}}>
                <span style={{color:border,fontWeight:700,flexShrink:0}}>•</span>{s}
              </div>
            ))}
          </div>
        </div>
      )}
      {adminMode && (
        <div style={{display:"flex",gap:6,padding:"0 14px 12px"}} onClick={e=>e.stopPropagation()}>
          <button className="btn btn-sm" onClick={onEdit}
            style={{flex:1,background:"#e0e7ff",color:"#4338ca"}}>✏️ Edytuj</button>
          <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm("Usunąć ten przepis?"))onDelete()}}
            style={{flex:1}}>🗑️ Usuń</button>
        </div>
      )}
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────
function App() {
  const [recipes,   setRecipes]   = useState(load);
  const [activeCat, setActiveCat] = useState("Wszystkie");
  const [expanded,  setExpanded]  = useState(null);
  const [search,    setSearch]    = useState("");
  const [adminMode, setAdminMode] = useState(false);
  const [modal,     setModal]     = useState(null); // null | "new" | recipe obj

  useEffect(()=>save(recipes),[recipes]);

  const cats = ["Wszystkie", ...Array.from(new Set(recipes.map(r=>r.cat)))];

  const filtered = recipes.filter(r=>{
    const mc = activeCat==="Wszystkie" || r.cat===activeCat;
    const ms = r.name.toLowerCase().includes(search.toLowerCase()) ||
      r.skladniki.some(s=>s.toLowerCase().includes(search.toLowerCase()));
    return mc && ms;
  });
  const grouped = {};
  filtered.forEach(r=>{if(!grouped[r.cat])grouped[r.cat]=[];grouped[r.cat].push(r);});

  const addOrUpdate = (form) => {
    if (modal === "new") {
      const newId = Math.max(0,...recipes.map(r=>r.id)) + 1;
      setRecipes(rs=>[...rs,{...form, id:newId}]);
    } else {
      setRecipes(rs=>rs.map(r=>r.id===modal.id?{...form,id:r.id}:r));
    }
    setModal(null);
  };

  const deleteRecipe = (id) => setRecipes(rs=>rs.filter(r=>r.id!==id));

  const resetAll = () => {
    if (confirm("Przywrócić domyślną listę przepisów? Wszystkie zmiany zostaną utracone!")) {
      setRecipes(DEFAULT_RECIPES);
    }
  };

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",paddingBottom:40}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",color:"white",padding:"24px 20px 20px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
            <div>
              <h1 style={{fontSize:26,fontWeight:800,letterSpacing:"-0.5px"}}>🍳 Moja Baza Przepisów</h1>
              <p style={{margin:"6px 0 0",opacity:0.7,fontSize:13}}>{recipes.length} przepisów · ▶ Film → YouTube/FB</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {adminMode && (
                <button className="btn" onClick={()=>setModal("new")}
                  style={{background:"#22c55e",color:"#fff"}}>➕ Nowy przepis</button>
              )}
              <button className="btn" onClick={()=>setAdminMode(a=>!a)}
                style={{background:adminMode?"#f59e0b":"rgba(255,255,255,0.15)",color:adminMode?"#1e293b":"#fff"}}>
                {adminMode?"✅ Tryb edycji ON":"⚙️ Edytuj listę"}
              </button>
            </div>
          </div>
          {adminMode && (
            <div style={{marginTop:12,padding:"10px 14px",background:"rgba(245,158,11,0.15)",borderRadius:10,border:"1px solid rgba(245,158,11,0.3)",fontSize:13}}>
              <strong>Tryb edycji aktywny</strong> — możesz dodawać, edytować i usuwać przepisy. Zmiany zapisują się automatycznie w przeglądarce. <span style={{opacity:0.7,cursor:"pointer",textDecoration:"underline"}} onClick={resetAll}>Przywróć domyślne</span>
            </div>
          )}
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Szukaj przepisu lub składnika..."
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"none",fontSize:14,outline:"none",marginTop:14}}/>
        </div>
      </div>

      {/* Kategorie */}
      <div style={{background:"#1e293b",padding:"0 20px 14px"}}>
        <div style={{maxWidth:980,margin:"0 auto",display:"flex",gap:8,flexWrap:"wrap",paddingTop:12}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setActiveCat(c)}
              style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
                background:activeCat===c?"#f59e0b":"rgba(255,255,255,0.1)",
                color:activeCat===c?"#1e293b":"white"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {/* Karty */}
      <div style={{maxWidth:980,margin:"20px auto",padding:"0 16px"}}>
        {Object.keys(grouped).length===0 &&
          <p style={{textAlign:"center",color:"#94a3b8",marginTop:40}}>Brak wyników 😶</p>}
        {Object.entries(grouped).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:32}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:"0 0 12px",color:"#1e293b"}}>{cat}</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
              {items.map(r=>(
                <RecipeCard key={r.id} r={r}
                  expanded={expanded===r.id}
                  onToggle={()=>setExpanded(expanded===r.id?null:r.id)}
                  onEdit={()=>setModal(r)}
                  onDelete={()=>deleteRecipe(r.id)}
                  adminMode={adminMode}/>
              ))}
            </div>
          </div>
        ))}
      </div>

      <p style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>
        Zdjęcia poglądowe z Unsplash · Zmiany zapisują się automatycznie w przeglądarce
      </p>

      {/* Modal */}
      {modal && <RecipeModal recipe={modal==="new"?null:modal} onSave={addOrUpdate} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
