name: Supabase Keep-Alive

  on:
    schedule:
      - cron: '0 8 */5 * *'
    workflow_dispatch:

  jobs:
    ping:
      runs-on: ubuntu-latest
      steps:
        - name: Ping Supabase
          env:
            SUPABASE_URL: https://fjhbnqbkdpgspucvanhq.supabase.co
            SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqaGJucWJrZHBnc3B1Y3ZhbmhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDE2ODgsImV4cCI6MjA4OTMxNzY4OH0.VylvExUM5BH59FzcXLQlZ7DKRmCbJX1AQs_AqPa3hFQ
          run: |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$SUPABASE_URL/rest/v1/recipes?limit=1" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY")
            echo "Supabase response status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "ERROR: Unexpected HTTP status $STATUS"
              exit 1
            fi
            echo "Supabase is alive!"
